<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Eye Healthcare - Mobile</title>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem('theme');
                var theme = (savedTheme === 'dark' || savedTheme === 'light') ? savedTheme : 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        :root {
            --primary: #007AFF;
            --primary-2: #5856D6;
            --bg: #ffffff;
            --card-bg: #ffffff;
            --text-dark: #1d1d1f;
            --text-sub: #86868b;
            --border: #d2d2d7;
            --tag-bg: #f5f5f7;
            --helper: #86868b;
            --btn-shadow: rgba(0, 122, 255, 0.15);
        }

        [data-theme="dark"] {
            --primary: #0A84FF;
            --primary-2: #5E5CE6;
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text-dark: #f5f5f7;
            --text-sub: #86868b;
            --border: #38383a;
            --tag-bg: #2c2c2e;
            --helper: #86868b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro KR", "SF Pro Display", "Pretendard", sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        /* 테마 스위치 - 모바일 상단 배치 */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--tag-bg);
            border: 1px solid var(--border);
            color: var(--text-dark);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .main-visual {
            margin-bottom: 24px;
        }

        .eye-icon {
            font-size: 5rem;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.05rem;
            margin: 0 0 16px 0;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--text-sub);
            margin-bottom: 32px;
            word-break: keep-all;
        }

        /* 질환 태그 그리드 */
        .feature-tags {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 40px;
        }

        .feature-tags span {
            background: var(--tag-bg);
            color: var(--primary);
            padding: 10px 4px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            border: 1px solid var(--border);
        }

        /* 액션 영역 */
        .action-group {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            height: 60px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: #ffffff;
            box-shadow: 0 10px 20px var(--btn-shadow);
        }

        .btn-kakao {
            background: #FEE500;
            color: #191919;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-dark);
        }

        .helper-text {
            margin-top: 24px;
            font-size: 0.8rem;
            color: var(--helper);
            line-height: 1.4;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <button id="theme-toggle" class="theme-toggle">
        <span id="theme-icon">🌙</span>
        <span id="theme-label">다크 모드</span>
    </button>

    <div class="container">
        <div class="main-visual">
            <span class="eye-icon">👁️</span>
        </div>

        <h1>안구 건강 진단</h1>
        <p class="subtitle">
            스마트폰 카메라와 <strong>AI 기술</strong>로<br>
            간편하게 눈 건강을 체크해 보세요.
        </p>

        <div class="feature-tags">
            <span>#결막염</span>
            <span>#백내장</span>
            <span>#익상편</span>
        </div>

        <div class="action-group">
            <a href="/login" class="btn btn-main">진단 시작하기</a>
            <button class="btn btn-kakao" onclick="alert('카카오 연동 기능 준비중')">💬 카카오로 계속하기</button>
            <p class="helper-text">
                ※ 본 서비스는 의료 보조용 스크리닝 도구이며,<br>
                정확한 진단은 전문의와 상의하십시오.
            </p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('theme-toggle');
        const icon = document.getElementById('theme-icon');
        const label = document.getElementById('theme-label');
        const root = document.documentElement;

        function updateUI(theme) {
            if (theme === 'dark') {
                icon.textContent = '☀️';
                label.textContent = '라이트 모드';
            } else {
                icon.textContent = '🌙';
                label.textContent = '다크 모드';
            }
        }

        btn.addEventListener('click', () => {
            const current = root.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateUI(next);
        });

        // 초기 UI 설정
        updateUI(root.getAttribute('data-theme'));
    </script>
</body>
</html>
