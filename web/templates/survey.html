<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안구 건강 문진표 - AI 키오스크</title>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --border: #d2d2d7;
            --accent: #28cd41;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            /* 키오스크 규격 고정 및 중앙 정렬 */
            width: 1240px; 
            height: 760px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.8rem; color: var(--primary); margin: 0; }
        p { margin: 5px 0; color: #86868b; }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            height: 82%;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow-y: auto;
        }

        h2 { font-size: 1.2rem; margin-bottom: 15px; border-left: 5px solid var(--primary); padding-left: 10px; }

        /* 입력 폼 스타일 */
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: 600; font-size: 0.9rem; }
        input, select, textarea {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 1rem;
            background: #f9f9f9;
        }

        /* 필수 항목 표시 스타일 */
        .required-mark {
            color: #ff3b30;
            margin-left: 3px;
        }

        /* 증상 체크 리스트 */
        .symptom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .check-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f2f2f7;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .check-item input { width: 20px; height: 20px; margin-right: 12px; }
        .check-item:active { background: #e5e5ea; }

        /* 하단 버튼 */
        .footer-btns {
            margin-top: auto;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-bottom: 10px;
        }

        .btn {
            padding: 15px 50px;
            border-radius: 15px;
            border: none;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }
        .btn-prev { background: #e5e5ea; color: #3a3a3c; text-decoration: none; display: inline-block; text-align: center; }
        .btn-next { background: var(--primary); color: white; }

    </style>
</head>
<body>

    <header>
        <h1>📋 안구 건강 정밀 문진</h1>
        <p>정확한 AI 분석을 위해 현재 상태를 솔직하게 답변해 주세요.</p>
    </header>

    <div class="main-container">
        <div class="card">
            <h2>👤 기본 정보</h2>
            <div class="input-row">
                <div class="field">
                    <label>나이<span class="required-mark">*</span></label>
                    <input type="number" id="user-age" placeholder="세" required min="1" max="120">
                </div>
                <div class="field">
                    <label>성별</label>
                    <select>
                        <option>남성</option>
                        <option>여성</option>
                    </select>
                </div>
            </div>
            <div class="field" style="margin-bottom:15px;">
                <label>안경/렌즈 착용 유무</label>
                <select>
                    <option>미착용</option>
                    <option>안경 착용</option>
                    <option>콘택트렌즈 착용</option>
                </select>
            </div>

            <h2>🏥 병력 및 생활 습관</h2>
            <div class="field" style="margin-bottom:10px;">
                <label>기저질환 (당뇨, 고혈압 등)</label>
                <textarea rows="2" placeholder="예: 당뇨(5년차), 고혈압 약 복용 중"></textarea>
            </div>
            <div class="field" style="margin-bottom:10px;">
                <label>안구 수술 이력</label>
                <input type="text" placeholder="수술명 및 시기 작성">
            </div>
            <div class="input-row">
                <div class="field">
                    <label>흡연 유무</label>
                    <select><option>비흡연</option><option>흡연</option></select>
                </div>
                <div class="field">
                    <label>음주 빈도</label>
                    <select><option>안함</option><option>가끔</option><option>자주</option></select>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>👁️ 현재 안구 증상 (해당되는 항목 모두 체크)</h2>
            <div class="symptom-grid">
                <label class="check-item"><input type="checkbox"> 시력이 예전보다 잘 안 보임</label>
                <label class="check-item"><input type="checkbox"> 사물이 흐리거나 흔들려 보임</label>
                <label class="check-item"><input type="checkbox"> 선이나 사물이 휘어 보임</label>
                <label class="check-item"><input type="checkbox"> 사물이 겹쳐서(둘로) 보임</label>
                <label class="check-item"><input type="checkbox"> 눈앞에 벌레 같은 게 떠다님</label>
                <label class="check-item"><input type="checkbox"> 시야의 일부가 가려져 보임</label>
                <label class="check-item"><input type="checkbox"> 눈이 시리고 통증이 느껴짐</label>
                <label class="check-item"><input type="checkbox"> 눈이 너무 건조하고 뻑뻑함</label>
                <label class="check-item"><input type="checkbox"> 이유 없이 눈물이 자주 남</label>
                <label class="check-item"><input type="checkbox"> 눈이 가렵거나 자주 충혈됨</label>
                <label class="check-item"><input type="checkbox"> 자고 나면 눈꼽이 많이 생김</label>
                <label class="check-item"><input type="checkbox"> 빛이 번져 보이거나 눈부심이 심함</label>
            </div>
            
            <div class="field" style="margin-top:20px;">
                <label>기타 불편한 점</label>
                <textarea rows="2" placeholder="위 항목 외에 불편한 점이 있다면 적어주세요."></textarea>
            </div>
        </div>
    </div>

    <div class="footer-btns">
        <button class="btn btn-prev" onclick="location.href='login.html'">이전으로 (본인인증)</button>
        <button class="btn btn-next" onclick="submitSurvey()">문진 완료 및 AI 검사 시작</button>
    </div>

    <script>
        function submitSurvey() {
            const ageInput = document.getElementById('user-age');
            
            // 나이 입력 여부 검사
            if (!ageInput.value) {
                alert("정확한 분석을 위해 나이를 입력해 주세요.");
                ageInput.focus();
                return;
            }

            if(confirm("문진 내용을 저장하고 AI 검사 단계로 이동하시겠습니까?")) {
                // 입력된 나이를 로컬 스토리지에 저장 (나중에 결과 리포트에서 활용 가능)
                localStorage.setItem('user_age', ageInput.value);
                location.href = 'capture.html'; 
            }
        }
    </script>
</body>
</html>
