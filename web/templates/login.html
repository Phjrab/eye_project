<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>본인 인증 - AI 안구 건강 스크리닝</title>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem('theme');
                var theme = (savedTheme === 'dark' || savedTheme === 'light') ? savedTheme : 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text-dark: #1d1d1f;
            --text-sub: #64748b;
            --border: #d2d2d7;
        }

        [data-theme="dark"] {
            --primary: #4ea1ff;
            --bg: #0f1115;
            --card: #161a22;
            --text-dark: #e5e7eb;
            --text-sub: #aab3c2;
            --border: #2a3240;
        }

        .theme-toggle-floating {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 3000;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-dark);
            border-radius: 999px;
            min-height: 44px;
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: -0.2px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(15,23,42,0.16);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.2s ease;
        }

        .theme-toggle-floating:hover { transform: translateY(-1px); }
        .theme-toggle-floating:active { transform: scale(0.98); }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 800px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            width: 700px;
            padding: 60px;
            background: var(--card);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
        }

        .auth-header h2 { font-size: 2.5rem; font-weight: 800; margin-bottom: 15px; }
        .auth-header p { font-size: 1.2rem; color: var(--text-sub); margin-bottom: 50px; }

        .input-group { text-align: left; margin-bottom: 35px; }
        .input-group label { display: block; font-weight: 700; margin-bottom: 12px; font-size: 1.1rem; }
        
        .input-group input {
            width: 100%;
            padding: 22px;
            border: 2px solid var(--border);
            border-radius: 18px;
            font-size: 1.4rem;
            box-sizing: border-box;
            transition: all 0.3s;
            background-color: #fafafa;
        }

        [data-theme="dark"] .input-group input { background-color: #0f172a; color: var(--text-dark); }
        [data-theme="dark"] .info-message { background: #0f172a; }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #ffffff;
        }

        .info-message {
            background: #f8fafc;
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 40px;
            text-align: left;
            border-left: 5px solid var(--primary);
        }

        .btn-confirm {
            width: 100%;
            background: linear-gradient(135deg, #007AFF, #2563eb);
            color: white;
            border: none;
            padding: 22px;
            border-radius: 18px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.2);
        }

        .btn-back {
            display: inline-block;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h2>본인 인증</h2>
        <p>기존 기록 조회 및 설문 시작을 위해 정보를 입력해주세요.</p>
    </div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="input-group">
            <label for="identifier">전화번호 또는 이메일</label>
            <input type="text" id="identifier" name="identifier" 
                   placeholder="010-1234-5678 또는 email@example.com" required>
        </div>

        <div class="info-message">
            <p style="margin:0; font-size:1rem; color:var(--text-sub); line-height:1.6;">
                ℹ️ <strong>비식별화 아키텍처</strong>를 통해 개인정보를 보호합니다.<br>
                입력하신 정보는 문진 결과 데이터베이스 매칭에 활용됩니다.
            </p>
        </div>

        <div class="action-section">
            <button type="submit" class="btn-confirm">인증 완료 및 설문 시작</button>
            <div>
                <a href="/" class="btn-back">이전으로 돌아가기</a>
            </div>
        </div>
    </form>
</div>

<script>
    async function handleLogin(event) {
        event.preventDefault(); 
        
        const identifier = document.getElementById('identifier').value.trim();
        const normalized = identifier.toLowerCase();

        // 관리자 로그인 분기
        if (normalized === 'admin') {
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: 'admin' })
                });
                const data = await res.json();

                if (!res.ok || data.status !== 'ok' || data.role !== 'admin') {
                    throw new Error(data.message || '관리자 로그인 실패');
                }

                localStorage.setItem('user_id', 'admin');
                localStorage.setItem('user_role', 'admin');
                alert('관리자 로그인 성공! 설정 페이지로 이동합니다.');
                window.location.href = '/admin/config';
                return false;
            } catch (error) {
                alert(`관리자 로그인 실패: ${error.message || error}`);
                return false;
            }
        }
        
        // 유효성 검사 규칙
        const phoneRegex = /^010-\d{3,4}-\d{4}$|^010\d{8}$/;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (phoneRegex.test(identifier) || emailRegex.test(identifier)) {
            // 사용자 식별자를 로컬 스토리지에 저장하여 나중에 survey에서 활용
            localStorage.setItem('user_id', identifier);
            localStorage.setItem('user_role', 'user');
            
            // 성공 알림 후 설문 페이지(survey)로 이동
            alert("인증 성공! 사전 설문 페이지로 이동합니다.");
            window.location.href = '/survey'; 
        } else {
            alert("올바른 전화번호(010-0000-0000) 또는 이메일 형식을 입력해주세요.");
        }
        
        return false;
    }
</script>

<script>
    (function () {
        const root = document.documentElement;

        function currentTheme() {
            const t = root.getAttribute('data-theme');
            return (t === 'dark' || t === 'light') ? t : 'light';
        }

        function applyTheme(theme, persist) {
            root.setAttribute('data-theme', theme);
            if (persist) {
                try { localStorage.setItem('theme', theme); } catch (e) {}
            }

            const btn = document.getElementById('global-theme-toggle');
            if (!btn) return;
            const icon = btn.querySelector('[data-role="icon"]');
            const label = btn.querySelector('[data-role="label"]');
            if (theme === 'dark') {
                if (icon) icon.textContent = '☀️';
                    if (label) label.textContent = '라이트 모드';
            } else {
                if (icon) icon.textContent = '🌙';
                    if (label) label.textContent = '다크 모드';
            }
        }

        function ensureToggleButton() {
            let btn = document.getElementById('global-theme-toggle');
            if (btn) return btn;

            btn = document.createElement('button');
            btn.id = 'global-theme-toggle';
            btn.className = 'theme-toggle-floating';
            btn.type = 'button';
            btn.innerHTML = '<span data-role="icon">🌙</span><span data-role="label">다크 모드</span>';
            document.body.appendChild(btn);
            return btn;
        }

        const btn = ensureToggleButton();
        applyTheme(currentTheme(), false);
        btn.addEventListener('click', function () {
            const next = currentTheme() === 'dark' ? 'light' : 'dark';
            applyTheme(next, true);
        });
    })();
</script>

</body>
</html>
