<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안구 촬영 - AI 안구 건강 스크리닝</title>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem('theme');
                var theme = (savedTheme === 'dark' || savedTheme === 'light') ? savedTheme : 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        :root { 
            --primary: #007AFF; 
            --bg: #f5f5f7; 
            --card: #ffffff; 
            --text: #1d1d1f; 
            --border: #d2d2d7; 
            --guide-color: rgba(40, 205, 65, 0.6); /* 연한 녹색 가이드 */
        }

        [data-theme="dark"] {
            --primary: #4ea1ff;
            --bg: #0f1115;
            --card: #161a22;
            --text: #e5e7eb;
            --border: #2a3240;
            --guide-color: rgba(52, 211, 153, 0.55);
        }

        .theme-toggle-floating {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            border-radius: 999px;
            min-height: 44px;
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: -0.2px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(15,23,42,0.16);
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.2s ease;
        }

        .theme-toggle-floating:hover { transform: translateX(-50%) translateY(-1px); }
        .theme-toggle-floating:active { transform: translateX(-50%) scale(0.98); }

        .confirm-toast {
            position: fixed;
            left: 50%;
            top: 24px;
            transform: translateX(-50%);
            width: min(92vw, 520px);
            background: #1f2937;
            color: #fff;
            border-radius: 12px;
            box-shadow: 0 12px 26px rgba(0,0,0,0.28);
            padding: 14px;
            z-index: 4000;
            display: none;
        }

        .confirm-toast.show { display: block; }

        .confirm-toast-message {
            font-size: 0.92rem;
            line-height: 1.45;
            margin-bottom: 10px;
            word-break: keep-all;
        }

        .confirm-toast-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .toast-btn {
            border: none;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
        }

        .toast-btn-cancel {
            background: #64748b;
            color: #fff;
        }

        .toast-btn-confirm {
            background: #ef4444;
            color: #fff;
        }

        [data-theme="dark"] .video-container,
        [data-theme="dark"] #video-feed { background: #0b1220; }
        [data-theme="dark"] .camera-bottom-btns { background: #111827; }
        [data-theme="dark"] .btn-upload,
        [data-theme="dark"] .btn-restore,
        [data-theme="dark"] #detection-status { background: #1f2937; color: var(--text); }
        [data-theme="dark"] .status-message { color: #cbd5e1 !important; }
        [data-theme="dark"] .confidence-text { color: #94a3b8 !important; }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            width: 1280px; 
            height: 800px; 
            overflow: hidden; 
            padding: 24px;
            box-sizing: border-box;
            gap: 24px;
        }

        /* 왼쪽: 카메라 섹션 */
        .left-panel { 
            flex: 1.4; 
            display: flex; 
            flex-direction: column; 
            background: var(--card); 
            position: relative; 
            overflow: hidden;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .video-container {
            width: 100%;
            height: 82%;
            position: relative;
            overflow: hidden;
            background: #222;
            border-top-left-radius: 18px;
            border-top-right-radius: 18px;
        }

        .video-container.mobile-upload-tappable {
            cursor: pointer;
        }

        #video-feed { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            background: #222; 
            transform-origin: center center;
            display: block;
        }

        .mobile-preview-hint {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 0.95rem;
            color: #cbd5e1;
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 10px;
            padding: 12px 14px;
            width: min(86%, 360px);
            line-height: 1.5;
            display: none;
            pointer-events: none;
        }

        .mobile-preview-hint.hint-pulse {
            animation: hintPulse 1.2s ease-in-out 3;
        }

        @keyframes hintPulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.95; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.95; }
        }

        .upload-progress-overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.62);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 8;
        }

        .upload-progress-card {
            background: rgba(15, 23, 42, 0.88);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 12px;
            padding: 12px 14px;
            width: min(86%, 320px);
            text-align: center;
        }

        .upload-progress-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .upload-progress-sub {
            font-size: 0.82rem;
            color: #cbd5e1;
        }

        .mobile-reupload-fab {
            position: absolute;
            right: 12px;
            bottom: 12px;
            z-index: 9;
            border: 1px solid rgba(148, 163, 184, 0.45);
            background: rgba(15, 23, 42, 0.8);
            color: #e2e8f0;
            border-radius: 999px;
            min-height: 42px;
            padding: 8px 12px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            display: none;
        }

        .btn-use-last {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: #eef2ff;
            color: #334155;
            border: 1px dashed var(--border);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            display: none;
        }


        /* 하단 및 우측 패널 스타일 유지 */
        .camera-bottom-btns { height: 18%; background: #ffffff; display: flex; align-items: center; justify-content: center; gap: 20px; border-top: 1px solid var(--border); padding: 0 20px; box-sizing: border-box; }
        .right-panel { flex: 1; padding: 30px; display: flex; flex-direction: column; justify-content: flex-start; background: var(--card); border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-y: auto; box-sizing: border-box; }
        .card { background: var(--card); padding: 25px; border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn-capture { width: 100%; padding: 25px; border-radius: 15px; background: var(--primary); color: white; font-weight: 800; border: none; font-size: 1.3rem; cursor: pointer; }
        .btn-upload { width: 100%; padding: 16px; border-radius: 12px; background: #eef2ff; color: #334155; font-weight: 700; border: 1px solid var(--border); font-size: 1rem; cursor: pointer; margin-top: 10px; }
        .btn-restore { width: 100%; padding: 14px; border-radius: 12px; background: #f8fafc; color: #475569; font-weight: 700; border: 1px solid var(--border); font-size: 0.95rem; cursor: pointer; margin-top: 8px; }
        .btn-go-result { width: 100%; padding: 18px; border-radius: 12px; background: #16a34a; color: #fff; font-weight: 800; border: none; font-size: 1.05rem; cursor: pointer; margin-top: 10px; }
        .btn-go-result:disabled { background: #cbd5e1; color: #64748b; cursor: not-allowed; }
        .eye-select-wrap { display:flex; gap:10px; }
        .btn-eye { flex:1; padding:14px; border:1px solid var(--border); border-radius:10px; background:#fff; font-weight:700; cursor:pointer; }
        .btn-eye.active { background:var(--primary); color:#fff; border-color:var(--primary); }
        .thumb-wrap { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
        .thumb-box { border:1px solid var(--border); border-radius:10px; padding:8px; background:#f8fafc; cursor:pointer; }
        .thumb-title { font-size:0.8rem; color:#64748b; margin-bottom:6px; font-weight:700; }
        .thumb-img { width:100%; height:70px; object-fit:cover; border-radius:8px; background:#e2e8f0; }

        .detection-status-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
        }

        .status-message {
            font-size: 0.95rem;
            color: #64748b;
        }

        .confidence-text {
            font-size: 0.85rem;
            color: #999;
            margin-top: 3px;
        }

        @media screen and (max-width: 768px) {
            body {
                width: 100%;
                min-height: 100dvh;
                height: auto;
                max-width: 100vw;
                padding: 12px;
                gap: 12px;
                overflow-x: hidden;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
            }

            .left-panel,
            .right-panel {
                width: 100%;
                flex: none;
            }

            .left-panel {
                min-height: 240px;
            }

            .video-container {
                height: clamp(220px, 42vh, 340px);
                min-height: 220px;
            }

            .camera-bottom-btns {
                height: auto;
                padding: 10px 12px;
                align-items: flex-start;
                justify-content: flex-start;
                flex-direction: column;
                gap: 8px;
            }

            .right-panel {
                padding: 14px;
            }

            .card {
                padding: 14px;
                margin-bottom: 12px;
            }

            .thumb-wrap {
                grid-template-columns: 1fr;
            }

            .btn-capture,
            .btn-upload,
            .btn-restore,
            .btn-go-result,
            .btn-eye {
                min-height: 48px;
                box-sizing: border-box;
            }

            .btn-capture {
                padding: 14px;
                font-size: 1.08rem;
            }

            body.mobile-upload-only {
                padding: 10px;
                gap: 10px;
                padding-bottom: calc(10px + env(safe-area-inset-bottom));
            }

            body.mobile-upload-only .left-panel {
                min-height: 52vh;
                border-radius: 14px;
            }

            body.mobile-upload-only .video-container {
                height: 52vh;
                min-height: 260px;
                max-height: 62vh;
                border-radius: 14px;
            }

            body.mobile-upload-only .right-panel {
                padding: 12px;
                border-radius: 14px;
                padding-bottom: calc(12px + env(safe-area-inset-bottom));
            }

            body.mobile-upload-only .right-panel .card {
                margin-bottom: 10px;
                padding: 12px;
            }

            body.mobile-upload-only .btn-upload,
            body.mobile-upload-only .btn-go-result {
                margin-top: 8px;
            }

            body.mobile-upload-only #capture-message {
                font-size: 0.86rem;
                line-height: 1.45;
            }

            body.mobile-upload-only .mobile-preview-hint {
                display: block;
                font-size: 0.9rem;
                width: min(90%, 360px);
            }

            body.mobile-upload-only .theme-toggle-floating {
                display: none;
            }

            body.mobile-upload-only .mobile-reupload-fab.show {
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            body.mobile-upload-only .btn-use-last.show {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="video-container">
            <!-- Canvas 또는 img로 프레임 표시 -->
            <img id="video-feed" src="">
            <div id="mobile-preview-hint" class="mobile-preview-hint">모바일 업로드 전용 모드입니다.<br>"얼굴 사진 업로드" 버튼으로 사진을 선택해 주세요.</div>
            <div id="upload-progress-overlay" class="upload-progress-overlay" aria-live="polite">
                <div class="upload-progress-card">
                    <div id="upload-progress-title" class="upload-progress-title">이미지 준비 중...</div>
                    <div id="upload-progress-sub" class="upload-progress-sub">잠시만 기다려 주세요.</div>
                </div>
            </div>
            <button id="btn-mobile-reupload" class="mobile-reupload-fab" onclick="openImageUploader()">다시 업로드</button>
        </div>

        <div class="camera-bottom-btns">
            <div id="camera-guide-text" style="font-size: 0.9rem; color: #64748b;">
                ※ 고해상도 촬영을 위해 가이드 중앙에 눈을 정렬해 주세요.
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div id="step0-card" class="card">
            <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--primary);">Step 0. 눈 감지 상태</h2>
            <div id="detection-status" class="detection-status-box">
                <div id="status-dot" style="width: 12px; height: 12px; border-radius: 50%; background: #ccc;"></div>
                <div>
                    <div id="status-message" class="status-message">카메라 연결 중...</div>
                    <div id="confidence-text" class="confidence-text"></div>
                </div>
            </div>
        </div>

        <div id="step2-card" class="card">
            <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--primary);">Step 1. 자동셔터 / 디지털 줌</h2>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                <span style="font-size:0.95rem; color:#334155;">자동셔터</span>
                <label style="display:flex; align-items:center; gap:8px; font-size:0.9rem; color:#64748b;">
                    <input type="checkbox" id="auto-shutter-toggle" checked onchange="toggleAutoShutter()">
                    사용
                </label>
            </div>
            <div id="auto-shutter-status" style="font-size:0.85rem; color:#64748b; margin-bottom:14px;">자동셔터 대기 중</div>

            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                <span style="font-size:0.95rem; color:#334155;">디지털 줌</span>
                <span id="zoom-value" style="font-size:0.9rem; color:#64748b;">1.0x</span>
            </div>
            <input id="zoom-slider" type="range" min="1" max="2.5" step="0.1" value="1" oninput="setDigitalZoom(this.value)" style="width:100%;">
        </div>

        <div class="card">
            <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--primary);">Step 2. 얼굴 촬영 / 업로드</h2>
            <button id="btn-capture-photo" class="btn-capture" onclick="takeSnapshot()">📸 얼굴 전체 촬영</button>
            <button class="btn-upload" onclick="openImageUploader()">🖼️ 얼굴 사진 업로드</button>
            <button id="btn-use-last-upload" class="btn-use-last" onclick="useLastUploadedImage()">↺ 최근 업로드 다시 사용</button>
            <button class="btn-restore" onclick="restoreCameraPreview()">↩️ 실시간 카메라로 복귀</button>
            <button id="btn-go-result" class="btn-go-result" onclick="goToResult()" disabled>✅ 결과 보기</button>
            <input id="upload-image-input" type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleUploadedImage(event)">
            <div id="capture-message" style="margin-top:10px; font-size:0.9rem; color:#64748b;">안내: 얼굴 사진 한 장을 촬영하면 YOLO가 좌/우 눈을 자동으로 감지해 분석합니다.</div>
        </div>

    </div>

    <div id="confirm-toast" class="confirm-toast" role="dialog" aria-modal="true" aria-live="assertive">
        <div id="confirm-toast-message" class="confirm-toast-message"></div>
        <div class="confirm-toast-actions">
            <button id="confirm-toast-cancel" class="toast-btn toast-btn-cancel" style="display:none;">취소</button>
            <button id="confirm-toast-ok" class="toast-btn toast-btn-confirm">확인</button>
        </div>
    </div>

    <script>
        let capturedPhoto = null;
        let analysisReady = false;
        let detectionPollingInterval = null;
        let digitalZoom = 1.0;
        let autoShutterEnabled = true;
        let isCapturing = false;
        let autoCooldownUntil = 0;
        let previewMode = 'camera'; // 'camera' | 'upload'
        let mobileUploadOnlyMode = false;
        const AUTO_SHUTTER_CONF_THRESHOLD = 0.70; // 70%
        const LAST_UPLOAD_KEY = 'last_mobile_upload_capture';
        const MOBILE_HINT_SEEN_KEY = 'mobile_upload_hint_seen_v1';

        function isMobileClient() {
            const ua = navigator.userAgent || '';
            return /Android|iPhone|iPad|iPod|Mobile|IEMobile|Opera Mini/i.test(ua);
        }

        function canUseMobileCameraDirectly() {
            return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.isSecureContext);
        }

        function enableMobileUploadOnlyMode() {
            mobileUploadOnlyMode = true;
            autoShutterEnabled = false;

            const bodyEl = document.body;
            const step0Card = document.getElementById('step0-card');
            const step2Card = document.getElementById('step2-card');
            const cameraBottom = document.querySelector('.camera-bottom-btns');
            const captureBtn = document.getElementById('btn-capture-photo');
            const restoreBtn = document.querySelector('.btn-restore');
            const autoToggle = document.getElementById('auto-shutter-toggle');
            const statusEl = document.getElementById('auto-shutter-status');
            const messageEl = document.getElementById('capture-message');
            const videoImg = document.getElementById('video-feed');
            const videoContainer = document.querySelector('.video-container');
            const previewHint = document.getElementById('mobile-preview-hint');
            const guideText = document.getElementById('camera-guide-text');
            const bottomBar = document.querySelector('.camera-bottom-btns');
            const useLastBtn = document.getElementById('btn-use-last-upload');
            const reuploadFab = document.getElementById('btn-mobile-reupload');

            if (bodyEl) bodyEl.classList.add('mobile-upload-only');
            if (step0Card) step0Card.style.display = 'none';
            if (step2Card) step2Card.style.display = 'none';
            if (cameraBottom) cameraBottom.style.display = 'none';
            if (captureBtn) captureBtn.style.display = 'none';
            if (restoreBtn) restoreBtn.style.display = 'none';
            if (autoToggle) autoToggle.checked = false;
            if (statusEl) statusEl.textContent = '모바일 업로드 모드';

            previewMode = 'upload';
            if (videoImg) {
                videoImg.removeAttribute('src');
                videoImg.style.background = '#0f172a';
                videoImg.style.objectFit = 'contain';
                videoImg.style.transform = 'none';
            }
            if (videoContainer) {
                videoContainer.classList.add('mobile-upload-tappable');
                if (!videoContainer.dataset.uploadTapBound) {
                    videoContainer.addEventListener('click', () => {
                        if (mobileUploadOnlyMode) openImageUploader();
                    });
                    videoContainer.dataset.uploadTapBound = '1';
                }
            }
            if (previewHint) previewHint.style.display = 'block';
            if (previewHint && !localStorage.getItem(MOBILE_HINT_SEEN_KEY)) {
                previewHint.classList.add('hint-pulse');
                localStorage.setItem(MOBILE_HINT_SEEN_KEY, '1');
            }
            if (guideText) guideText.textContent = '※ 모바일에서는 웹캠 대신 업로드한 이미지가 이 영역에 표시됩니다.';
            if (bottomBar) {
                bottomBar.style.justifyContent = 'center';
                bottomBar.style.alignItems = 'center';
            }
            if (useLastBtn && localStorage.getItem(LAST_UPLOAD_KEY)) {
                useLastBtn.classList.add('show');
            }

            if (messageEl) {
                messageEl.textContent = '모바일 환경에서는 업로드 전용으로 동작합니다. 위 미리보기 영역을 탭하거나 업로드 버튼으로 얼굴 사진을 등록해 주세요.';
            }
            if (reuploadFab) {
                reuploadFab.classList.remove('show');
            }
        }

        function setUploadProgress(show, title = '처리 중...', sub = '잠시만 기다려 주세요.') {
            const overlay = document.getElementById('upload-progress-overlay');
            const titleEl = document.getElementById('upload-progress-title');
            const subEl = document.getElementById('upload-progress-sub');
            if (!overlay || !titleEl || !subEl) return;
            titleEl.textContent = title;
            subEl.textContent = sub;
            overlay.style.display = show ? 'flex' : 'none';
        }

        function setLastUploadAvailability() {
            const useLastBtn = document.getElementById('btn-use-last-upload');
            if (!useLastBtn) return;
            if (mobileUploadOnlyMode && localStorage.getItem(LAST_UPLOAD_KEY)) {
                useLastBtn.classList.add('show');
            } else {
                useLastBtn.classList.remove('show');
            }
        }

        function showToastPopup(message) {
            return new Promise((resolve) => {
                const toast = document.getElementById('confirm-toast');
                const msgEl = document.getElementById('confirm-toast-message');
                const okBtn = document.getElementById('confirm-toast-ok');
                const cancelBtn = document.getElementById('confirm-toast-cancel');

                if (!toast || !msgEl || !okBtn || !cancelBtn) {
                    window.alert(message);
                    resolve(true);
                    return;
                }

                msgEl.textContent = message;
                cancelBtn.style.display = 'none';
                toast.classList.add('show');

                okBtn.onclick = () => {
                    toast.classList.remove('show');
                    okBtn.onclick = null;
                    resolve(true);
                };
            });
        }

        function clearSessionCaptureData() {
            localStorage.removeItem('eye_analysis_L');
            localStorage.removeItem('eye_analysis_R');
            localStorage.removeItem('bilateral_capture');
            localStorage.removeItem('bilateral_analysis');
            localStorage.removeItem('data_updated');
        }

        function syncUserScopedCaptureCache() {
            const currentUserId = (localStorage.getItem('user_id') || 'anonymous').trim() || 'anonymous';
            const lastUserId = localStorage.getItem('active_capture_user_id') || '';

            if (lastUserId && lastUserId !== currentUserId) {
                clearSessionCaptureData();
            }

            localStorage.setItem('active_capture_user_id', currentUserId);
        }

        // ==========================================
        // 눈 감지 상태 폴링 (서버에서 감지 여부 조회)
        // ==========================================
        async function pollDetectionStatus() {
            if (mobileUploadOnlyMode) return;
            try {
                const response = await fetch('/detect_status');
                const data = await response.json();
                
                const statusDot = document.getElementById('status-dot');
                const statusMessage = document.getElementById('status-message');
                const confidenceText = document.getElementById('confidence-text');
                
                if (data.detected) {
                    statusDot.style.background = '#28cd41';  // 녹색
                    statusMessage.textContent = data.message;
                    confidenceText.textContent = `신뢰도: ${(data.confidence * 100).toFixed(1)}%`;
                } else {
                    statusDot.style.background = '#b0bec5';  // 회색
                    statusMessage.textContent = data.message;
                    confidenceText.textContent = '';
                }

                handleAutoShutter(data.detected, data.confidence || 0);
            } catch (error) {
                console.error('[Detection Status Error]', error);
            }
        }

        function toggleAutoShutter() {
            autoShutterEnabled = document.getElementById('auto-shutter-toggle').checked;
            const statusEl = document.getElementById('auto-shutter-status');
            statusEl.textContent = autoShutterEnabled ? '자동셔터 대기 중' : '자동셔터 꺼짐';
        }

        function setDigitalZoom(value) {
            digitalZoom = Math.max(1, parseFloat(value) || 1);
            const videoImg = document.getElementById('video-feed');
            const zoomValue = document.getElementById('zoom-value');

            if (previewMode === 'camera') {
                videoImg.style.objectFit = 'cover';
                videoImg.style.transform = `scaleX(-1) scale(${digitalZoom})`;
            }
            zoomValue.textContent = `${digitalZoom.toFixed(1)}x`;
        }

        function handleAutoShutter(detected, confidence) {
            const statusEl = document.getElementById('auto-shutter-status');

            if (!autoShutterEnabled) {
                statusEl.textContent = '자동셔터 꺼짐';
                return;
            }

            if (previewMode !== 'camera') {
                statusEl.textContent = '업로드 이미지 분석 모드';
                return;
            }

            if (isCapturing || Date.now() < autoCooldownUntil) {
                return;
            }

            if (!detected) {
                statusEl.textContent = `자동셔터 대기 중 (목표: ${(AUTO_SHUTTER_CONF_THRESHOLD * 100).toFixed(0)}%)`;
                return;
            }

            const confPct = (confidence * 100).toFixed(1);
            statusEl.textContent = `자동셔터 판단 중... (현재: ${confPct}%)`;

            if (confidence >= AUTO_SHUTTER_CONF_THRESHOLD) {
                statusEl.textContent = `자동셔터 촬영 중... (${confPct}%)`;
                autoCooldownUntil = Date.now() + 1500;
                takeSnapshot(true);
            }
        }

        function openImageUploader() {
            document.getElementById('upload-image-input').click();
        }

        function restoreCameraPreview() {
            if (mobileUploadOnlyMode) {
                return;
            }
            const videoImg = document.getElementById('video-feed');
            const captureMessage = document.getElementById('capture-message');
            previewMode = 'camera';
            videoImg.src = '/video_feed';
            videoImg.style.objectFit = 'cover';
            videoImg.style.transform = `scaleX(-1) scale(${digitalZoom})`;
            captureMessage.textContent = '실시간 카메라 모드로 복귀했습니다.';
        }

        async function loadImageElementWithOrientation(file, dataUrl) {
            // createImageBitmap(imageOrientation=from-image)로 EXIF 방향 보정 우선 시도
            if (window.createImageBitmap && file) {
                try {
                    return await createImageBitmap(file, { imageOrientation: 'from-image' });
                } catch (error) {
                    // fallback으로 Image 사용
                }
            }

            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = dataUrl;
            });
        }

        function normalizeUploadError(error) {
            const text = String(error?.message || error || '').toLowerCase();
            if (text.includes('network') || text.includes('fetch') || text.includes('failed to fetch')) {
                return '네트워크 오류로 업로드에 실패했습니다. 연결 상태를 확인해 주세요.';
            }
            if (text.includes('decode') || text.includes('format') || text.includes('mime')) {
                return '지원하지 않는 이미지 형식입니다. JPG/PNG 파일을 사용해 주세요.';
            }
            if (text.includes('server') || text.includes('500') || text.includes('analy')) {
                return '서버 분석 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.';
            }
            return '업로드 이미지 처리에 실패했습니다. 다른 사진으로 다시 시도해 주세요.';
        }

        function showDetectionToast(result) {
            const hasLeft = !!result?.left_eye;
            const hasRight = !!result?.right_eye;

            if (hasLeft && hasRight) {
                return;
            }

            if (hasLeft || hasRight) {
                const side = hasLeft ? '왼쪽 눈' : '오른쪽 눈';
                showToastPopup(`${side}만 감지되었습니다. 정면 얼굴 사진으로 다시 업로드하면 양안 감지 확률이 높아집니다.`);
                return;
            }

            showToastPopup('눈이 감지되지 않았습니다. 조명이 밝은 곳에서 얼굴 전체가 나오도록 다시 업로드해 주세요.');
        }

        function applyUploadedPreview(dataUrl) {
            const videoImg = document.getElementById('video-feed');
            const previewHint = document.getElementById('mobile-preview-hint');
            const reuploadFab = document.getElementById('btn-mobile-reupload');

            previewMode = 'upload';
            videoImg.src = dataUrl;
            videoImg.style.objectFit = 'contain';
            videoImg.style.transform = 'none';
            if (previewHint) previewHint.style.display = 'none';
            if (reuploadFab && mobileUploadOnlyMode) reuploadFab.classList.add('show');
        }

        async function useLastUploadedImage() {
            const captureMessage = document.getElementById('capture-message');
            const dataUrl = localStorage.getItem(LAST_UPLOAD_KEY);
            if (!dataUrl) {
                await showToastPopup('최근 업로드 이미지가 없습니다. 먼저 새 이미지를 업로드해 주세요.');
                return;
            }

            try {
                setUploadProgress(true, '최근 업로드 불러오는 중...', '저장된 이미지를 다시 분석합니다.');
                capturedPhoto = dataUrl;
                applyUploadedPreview(dataUrl);
                const analysisResult = await analyzeWithServer(dataUrl);
                captureMessage.textContent = analysisResult.ok ? '최근 업로드 이미지 재분석 완료' : '최근 업로드 이미지 재분석 실패';
            } catch (error) {
                captureMessage.textContent = normalizeUploadError(error);
            } finally {
                setUploadProgress(false);
            }
        }

        function setResultButtonState(enabled) {
            const btn = document.getElementById('btn-go-result');
            btn.disabled = !enabled;
        }

        function hasAnalysisResult() {
            // 서버가 L 또는 R 중 하나라도 돌려줬으면 결과 진행 가능
            return !!localStorage.getItem('eye_analysis_L') || !!localStorage.getItem('eye_analysis_R');
        }

        function goToResult() {
            if (!hasAnalysisResult()) {
                showToastPopup('촬영 또는 업로드 후 분석이 완료되면 결과 보기가 가능합니다.');
                return;
            }
            syncCombinedAnalysisToLocalStorage();
            window.location.href = '/result';
        }

        function parseStoredJson(key) {
            const raw = localStorage.getItem(key);
            if (!raw) return null;
            try {
                return JSON.parse(raw);
            } catch (error) {
                console.warn(`[Storage Parse Error] ${key}`, error);
                return null;
            }
        }

        function normalizeConfidencePercent(value) {
            const num = Number(value);
            if (!Number.isFinite(num)) return 0;
            return num <= 1 ? num * 100 : num;
        }

        function getCombinedAnalysis() {
            const stored = parseStoredJson('bilateral_analysis') || {};
            const leftStored = parseStoredJson('eye_analysis_L');
            const rightStored = parseStoredJson('eye_analysis_R');

            return {
                ...stored,
                status: (leftStored || stored.left_eye || rightStored || stored.right_eye) ? 'success' : (stored.status || 'idle'),
                left_eye: leftStored || stored.left_eye || null,
                right_eye: rightStored || stored.right_eye || null
            };
        }

        function syncCombinedAnalysisToLocalStorage(extra = {}) {
            const combined = {
                ...getCombinedAnalysis(),
                ...extra
            };
            localStorage.setItem('bilateral_analysis', JSON.stringify(combined));
            return combined;
        }

        async function handleUploadedImage(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) {
                return;
            }

            const captureMessage = document.getElementById('capture-message');

            try {
                if (!String(file.type || '').startsWith('image/')) {
                    throw new Error('unsupported-image-format');
                }

                captureMessage.textContent = '업로드 이미지 처리 중...';
                setUploadProgress(true, '이미지 읽는 중...', '사진 파일을 불러오고 있습니다.');
                const rawDataUrl = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });

                setUploadProgress(true, '방향 보정 중...', '모바일 EXIF 정보를 반영하고 있습니다.');
                const srcImg = await loadImageElementWithOrientation(file, rawDataUrl);

                // 업로드 이미지는 1280x720으로 제한 (메인 스레드 블로킹 방지)
                const maxW = 1280;
                const maxH = 720;
                const scale = Math.min(maxW / srcImg.width, maxH / srcImg.height, 1);
                const outW = Math.max(1, Math.round(srcImg.width * scale));
                const outH = Math.max(1, Math.round(srcImg.height * scale));

                const canvas = document.createElement('canvas');
                canvas.width = outW;
                canvas.height = outH;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(srcImg, 0, 0, outW, outH);

                // 메인 스레드 양보 후 toDataURL 실행 (UI 프리징 방지)
                await new Promise(r => setTimeout(r, 0));
                setUploadProgress(true, '이미지 최적화 중...', '분석 전 크기 최적화를 진행합니다.');
                const dataUrl = canvas.toDataURL('image/jpeg', 0.75);

                localStorage.setItem(LAST_UPLOAD_KEY, dataUrl);
                setLastUploadAvailability();
                capturedPhoto = dataUrl;
                applyUploadedPreview(dataUrl);

                setUploadProgress(true, '서버 분석 중...', 'YOLO가 좌/우 눈을 감지하고 있습니다.');
                const analysisResult = await analyzeWithServer(dataUrl);
                captureMessage.textContent = analysisResult.ok ? '업로드/분석 완료' : '업로드/분석 실패';
            } catch (error) {
                console.error('[Upload Analyze Error]', error);
                captureMessage.textContent = normalizeUploadError(error);
            } finally {
                setUploadProgress(false);
                event.target.value = '';
            }
        }

        // ==========================================
        // 카메라 이미지 캡처 및 분석
        // ==========================================
        async function takeSnapshot(isAuto = false) {
            if (mobileUploadOnlyMode) {
                await showToastPopup('모바일에서는 사진 업로드 방식으로 촬영을 진행해 주세요.');
                openImageUploader();
                return;
            }

            if (isCapturing) {
                return;
            }

            isCapturing = true;
            const videoImg = document.getElementById('video-feed');
            const captureMessage = document.getElementById('capture-message');
            try {
                captureMessage.textContent = isAuto ? '자동셔터 촬영 중...' : '촬영 및 분석 중...';

                // 1. 고해상도 캡처 캔버스 생성 (해상도 방어)
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 1920;
                tempCanvas.height = 1080;
                const ctx = tempCanvas.getContext('2d');

                // 2. 줌 배율을 캡처에도 동일하게 반영 (중앙 크롭)
                const sourceWidth = videoImg.naturalWidth || 640;
                const sourceHeight = videoImg.naturalHeight || 480;
                const cropWidth = sourceWidth / digitalZoom;
                const cropHeight = sourceHeight / digitalZoom;
                const sx = (sourceWidth - cropWidth) / 2;
                const sy = (sourceHeight - cropHeight) / 2;

                // (UI는 거울처럼 반전되어 있지만, AI 진단을 위해 원본 방향 그대로 캡처합니다)
                ctx.drawImage(videoImg, sx, sy, cropWidth, cropHeight, 0, 0, tempCanvas.width, tempCanvas.height);

                // 3. 이미지를 Base64 데이터로 변환
                const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.8);
                capturedPhoto = dataUrl;

                // 서버로 전송
                await analyzeWithServer(dataUrl);
                captureMessage.textContent = '촬영/분석 완료';
            } catch (error) {
                captureMessage.textContent = '촬영/분석 실패. 다시 시도해 주세요.';
                console.error('[Capture Error]', error);
            } finally {
                isCapturing = false;
            }
        }

        // ==========================================
        // 서버 분석 (Base64 이미지 → EfficientNet)
        // ==========================================
        async function analyzeWithServer(base64Image) {
            const captureMessage = document.getElementById('capture-message');
            try {
                captureMessage.textContent = '서버 분석 중 (YOLO 눈 자동 감지)...';
                const userId = localStorage.getItem('user_id') || 'anonymous';
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image, user_id: userId })
                });

                const result = await response.json();

                if (response.ok) {
                    // YOLO가 감지한 좌/우 눈을 각각 저장 (없으면 이전 값 유지)
                    if (result.left_eye)  localStorage.setItem('eye_analysis_L', JSON.stringify(result.left_eye));
                    if (result.right_eye) localStorage.setItem('eye_analysis_R', JSON.stringify(result.right_eye));

                    const detectedSides = [result.left_eye ? '좌안' : null, result.right_eye ? '우안' : null].filter(Boolean);
                    const detectedText = detectedSides.length ? detectedSides.join(', ') + ' 감지됨' : '눈 감지 실패 - 다시 시도해 주세요';

                    syncCombinedAnalysisToLocalStorage({
                        guide: result.guide,
                        meta: result.meta,
                        message: result.message,
                        user_id: result.user_id,
                        saved_image_url: result.saved_image_url
                    });

                    if (capturedPhoto) localStorage.setItem('bilateral_capture', capturedPhoto);

                    captureMessage.textContent = detectedText;
                    setResultButtonState(hasAnalysisResult());
                    showDetectionToast(result);
                    return { ok: true, left: !!result.left_eye, right: !!result.right_eye, result };
                } else {
                    captureMessage.textContent = result.error || '분석 중 오류가 발생했습니다.';
                    setResultButtonState(false);
                    return { ok: false, message: result.error || '분석 중 오류' };
                }
            } catch (error) {
                console.error('[Server Analysis Error]', error);
                captureMessage.textContent = '서버 통신 오류가 발생했습니다.';
                setResultButtonState(false);
                return { ok: false, message: String(error || 'server-error') };
            }
        }

        // 화면 로딩 시 프레임 스트리밍 및 감지 폴링 시작
        window.onload = () => {
            syncUserScopedCaptureCache();
            clearSessionCaptureData();

            if (isMobileClient()) {
                enableMobileUploadOnlyMode();
            }

            const videoImg = document.getElementById('video-feed');
            if (!mobileUploadOnlyMode) {
                videoImg.style.objectFit = 'cover';
                videoImg.style.transform = `scaleX(-1) scale(${digitalZoom})`;
            }

            capturedPhoto = null;
            analysisReady = false;
            setLastUploadAvailability();
            if (mobileUploadOnlyMode) {
                previewMode = 'upload';
            } else {
                restoreCameraPreview();
            }
            setResultButtonState(false);

            // 감지 상태 즉시 조회 & 주기적으로 폴링 (500ms)
            if (!mobileUploadOnlyMode) {
                pollDetectionStatus();
                detectionPollingInterval = setInterval(pollDetectionStatus, 500);
            }
        };

        // 페이지 종료 시 폴링 중지
        window.onbeforeunload = () => {
            if (detectionPollingInterval) {
                clearInterval(detectionPollingInterval);
            }
        };
    </script>
    <script>
        (function () {
            const root = document.documentElement;
            function currentTheme() {
                const t = root.getAttribute('data-theme');
                return (t === 'dark' || t === 'light') ? t : 'light';
            }
            function applyTheme(theme, persist) {
                root.setAttribute('data-theme', theme);
                if (persist) {
                    try { localStorage.setItem('theme', theme); } catch (e) {}
                }
                const btn = document.getElementById('global-theme-toggle');
                if (!btn) return;
                const icon = btn.querySelector('[data-role="icon"]');
                const label = btn.querySelector('[data-role="label"]');
                if (theme === 'dark') {
                    if (icon) icon.textContent = '☀️';
                    if (label) label.textContent = '라이트 모드';
                } else {
                    if (icon) icon.textContent = '🌙';
                    if (label) label.textContent = '다크 모드';
                }
            }
            applyTheme(currentTheme(), false);
        })();
    </script>
</body>
