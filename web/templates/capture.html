<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안구 촬영 - AI 안구 건강 스크리닝</title>
    <style>
        :root { 
            --primary: #007AFF; 
            --bg: #f5f5f7; 
            --card: #ffffff; 
            --text: #1d1d1f; 
            --border: #d2d2d7; 
            --guide-color: rgba(40, 205, 65, 0.6); /* 연한 녹색 가이드 */
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            width: 1280px; 
            height: 800px; 
            overflow: hidden; 
        }

        /* 왼쪽: 카메라 섹션 */
        .left-panel { 
            flex: 1.4; 
            display: flex; 
            flex-direction: column; 
            background: #000; 
            position: relative; 
            overflow: hidden;
        }

        .video-container {
            width: 100%;
            height: 82%;
            position: relative;
            overflow: hidden;
            background: #222;
        }

        #video-feed { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            background: #222; 
            transform-origin: center center;
            display: block;
        }


        /* 하단 및 우측 패널 스타일 유지 */
        .camera-bottom-btns { height: 18%; background: #ffffff; display: flex; align-items: center; justify-content: center; gap: 20px; border-top: 1px solid var(--border); }
        .right-panel { flex: 1; padding: 30px; display: flex; flex-direction: column; justify-content: flex-start; background: var(--bg); border-left: 1px solid var(--border); overflow-y: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn-capture { width: 100%; padding: 25px; border-radius: 15px; background: var(--primary); color: white; font-weight: 800; border: none; font-size: 1.3rem; cursor: pointer; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
        .result-eye { padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: #fff; }
        .result-title { font-size: 0.9rem; color: #475569; margin-bottom: 6px; font-weight: 700; }
        .result-value { font-size: 0.95rem; color: #0f172a; line-height: 1.35; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="video-container">
            <!-- Canvas 또는 img로 프레임 표시 -->
            <img id="video-feed" src="/video_feed">
        </div>

        <div class="camera-bottom-btns">
            <div style="font-size: 0.9rem; color: #64748b;">
                ※ 고해상도 촬영을 위해 가이드 중앙에 눈을 정렬해 주세요.
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="card">
            <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--primary);">Step 0. 눈 감지 상태</h2>
            <div id="detection-status" style="display: flex; align-items: center; gap: 10px; padding: 15px; background: #f0f0f0; border-radius: 10px;">
                <div id="status-dot" style="width: 12px; height: 12px; border-radius: 50%; background: #ccc;"></div>
                <div>
                    <div id="status-message" style="font-size: 0.95rem; color: #64748b;">카메라 연결 중...</div>
                    <div id="confidence-text" style="font-size: 0.85rem; color: #999; margin-top: 3px;"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--primary);">Step 1. 자동셔터 / 디지털 줌</h2>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                <span style="font-size:0.95rem; color:#334155;">자동셔터</span>
                <label style="display:flex; align-items:center; gap:8px; font-size:0.9rem; color:#64748b;">
                    <input type="checkbox" id="auto-shutter-toggle" checked onchange="toggleAutoShutter()">
                    사용
                </label>
            </div>
            <div id="auto-shutter-status" style="font-size:0.85rem; color:#64748b; margin-bottom:14px;">자동셔터 대기 중</div>

            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                <span style="font-size:0.95rem; color:#334155;">디지털 줌</span>
                <span id="zoom-value" style="font-size:0.9rem; color:#64748b;">1.0x</span>
            </div>
            <input id="zoom-slider" type="range" min="1" max="2.5" step="0.1" value="1" oninput="setDigitalZoom(this.value)" style="width:100%;">
        </div>

        <div class="card">
            <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--primary);">Step 2. 양안 1장 촬영 및 분석</h2>
            <button class="btn-capture" onclick="takeSnapshot()">📸 양쪽 눈 한 번에 촬영</button>
            <div id="capture-message" style="margin-top:10px; font-size:0.9rem; color:#64748b;">안내: 양쪽 눈이 가이드에 모두 들어오도록 정렬해 주세요.</div>
        </div>

        <div class="card">
            <h2 style="margin:0 0 10px 0; font-size: 1.2rem; color: var(--primary);">Step 3. 분석 결과</h2>
            <div id="analysis-summary" style="font-size:0.95rem; color:#64748b;">아직 분석 결과가 없습니다.</div>
            <div class="result-grid">
                <div class="result-eye">
                    <div class="result-title">왼쪽 눈</div>
                    <div class="result-value" id="left-eye-result">-</div>
                </div>
                <div class="result-eye">
                    <div class="result-title">오른쪽 눈</div>
                    <div class="result-value" id="right-eye-result">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let capturedPhoto = null;
        let detectionPollingInterval = null;
        let digitalZoom = 1.0;
        let autoShutterEnabled = true;
        let isCapturing = false;
        let autoCooldownUntil = 0;
        const AUTO_SHUTTER_CONF_THRESHOLD = 0.70; // 70%

        // ==========================================
        // 눈 감지 상태 폴링 (서버에서 감지 여부 조회)
        // ==========================================
        async function pollDetectionStatus() {
            try {
                const response = await fetch('/detect_status');
                const data = await response.json();
                
                const statusDot = document.getElementById('status-dot');
                const statusMessage = document.getElementById('status-message');
                const confidenceText = document.getElementById('confidence-text');
                
                if (data.detected) {
                    statusDot.style.background = '#28cd41';  // 녹색
                    statusMessage.textContent = data.message;
                    confidenceText.textContent = `신뢰도: ${(data.confidence * 100).toFixed(1)}%`;
                } else {
                    statusDot.style.background = '#b0bec5';  // 회색
                    statusMessage.textContent = data.message;
                    confidenceText.textContent = '';
                }

                handleAutoShutter(data.detected, data.confidence || 0);
            } catch (error) {
                console.error('[Detection Status Error]', error);
            }
        }

        function toggleAutoShutter() {
            autoShutterEnabled = document.getElementById('auto-shutter-toggle').checked;
            const statusEl = document.getElementById('auto-shutter-status');
            statusEl.textContent = autoShutterEnabled ? '자동셔터 대기 중' : '자동셔터 꺼짐';
        }

        function setDigitalZoom(value) {
            digitalZoom = Math.max(1, parseFloat(value) || 1);
            const videoImg = document.getElementById('video-feed');
            const zoomValue = document.getElementById('zoom-value');

            videoImg.style.transform = `scaleX(-1) scale(${digitalZoom})`;
            zoomValue.textContent = `${digitalZoom.toFixed(1)}x`;
        }

        function handleAutoShutter(detected, confidence) {
            const statusEl = document.getElementById('auto-shutter-status');

            if (!autoShutterEnabled) {
                statusEl.textContent = '자동셔터 꺼짐';
                return;
            }

            if (isCapturing || Date.now() < autoCooldownUntil) {
                return;
            }

            if (!detected) {
                statusEl.textContent = `자동셔터 대기 중 (목표: ${(AUTO_SHUTTER_CONF_THRESHOLD * 100).toFixed(0)}%)`;
                return;
            }

            const confPct = (confidence * 100).toFixed(1);
            statusEl.textContent = `자동셔터 판단 중... (현재: ${confPct}%)`;

            if (confidence >= AUTO_SHUTTER_CONF_THRESHOLD) {
                statusEl.textContent = `자동셔터 촬영 중... (${confPct}%)`;
                autoCooldownUntil = Date.now() + 1500;
                takeSnapshot(true);
            }
        }

        // ==========================================
        // 카메라 이미지 캡처 및 분석
        // ==========================================
        async function takeSnapshot(isAuto = false) {
            if (isCapturing) {
                return;
            }

            isCapturing = true;
            const videoImg = document.getElementById('video-feed');
            const captureMessage = document.getElementById('capture-message');
            try {
                captureMessage.textContent = isAuto ? '자동셔터 촬영 중...' : '촬영 및 분석 중...';

                // 1. 고해상도 캡처 캔버스 생성 (해상도 방어)
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 1920;
                tempCanvas.height = 1080;
                const ctx = tempCanvas.getContext('2d');

                // 2. 줌 배율을 캡처에도 동일하게 반영 (중앙 크롭)
                const sourceWidth = videoImg.naturalWidth || 640;
                const sourceHeight = videoImg.naturalHeight || 480;
                const cropWidth = sourceWidth / digitalZoom;
                const cropHeight = sourceHeight / digitalZoom;
                const sx = (sourceWidth - cropWidth) / 2;
                const sy = (sourceHeight - cropHeight) / 2;

                // (UI는 거울처럼 반전되어 있지만, AI 진단을 위해 원본 방향 그대로 캡처합니다)
                ctx.drawImage(videoImg, sx, sy, cropWidth, cropHeight, 0, 0, tempCanvas.width, tempCanvas.height);

                // 3. 이미지를 Base64 데이터로 변환
                const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.8);
                capturedPhoto = dataUrl;

                // 서버로 전송
                await analyzeWithServer(dataUrl);
                captureMessage.textContent = '촬영/분석 완료';
            } catch (error) {
                captureMessage.textContent = '촬영/분석 실패. 다시 시도해 주세요.';
                console.error('[Capture Error]', error);
            } finally {
                isCapturing = false;
            }
        }

        // ==========================================
        // 서버 분석 (Base64 이미지 → EfficientNet)
        // ==========================================
        async function analyzeWithServer(base64Image) {
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: base64Image
                    })
                });

                const result = await response.json();
                
                if (response.ok) {
                    updateAnalysisResult(result);
                    localStorage.setItem('bilateral_analysis', JSON.stringify(result));
                    if (capturedPhoto) {
                        localStorage.setItem('bilateral_capture', capturedPhoto);
                    }
                } else {
                    console.error(`[Analysis Error] ${result.error}`);
                    const summary = document.getElementById('analysis-summary');
                    summary.textContent = result.error || '분석 중 오류가 발생했습니다.';
                }
            } catch (error) {
                console.error('[Server Analysis Error]', error);
                const summary = document.getElementById('analysis-summary');
                summary.textContent = '서버 통신 오류가 발생했습니다.';
            }
        }

        function updateAnalysisResult(result) {
            const summary = document.getElementById('analysis-summary');
            const leftResult = document.getElementById('left-eye-result');
            const rightResult = document.getElementById('right-eye-result');

            if (result.status !== 'success') {
                summary.textContent = result.message || '분석 실패';
                leftResult.textContent = '-';
                rightResult.textContent = '-';
                return;
            }

            const left = result.left_eye;
            const right = result.right_eye;

            summary.textContent = '양안 분석 완료';
            leftResult.textContent = left ? `${left.disease} (${left.confidence.toFixed(1)}%)` : '검출 실패';
            rightResult.textContent = right ? `${right.disease} (${right.confidence.toFixed(1)}%)` : '검출 실패';
        }

        // 화면 로딩 시 프레임 스트리밍 및 감지 폴링 시작
        window.onload = () => {
            // 감지 상태 즉시 조회 & 주기적으로 폴링 (500ms)
            pollDetectionStatus();
            detectionPollingInterval = setInterval(pollDetectionStatus, 500);
        };

        // 페이지 종료 시 폴링 중지
        window.onbeforeunload = () => {
            if (detectionPollingInterval) {
                clearInterval(detectionPollingInterval);
            }
        };
    </script>
</body>
</html>
