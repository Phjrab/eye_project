<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안구 촬영 - AI 안구 건강 스크리닝</title>
    <style>
        :root { 
            --primary: #007AFF; 
            --bg: #f5f5f7; 
            --card: #ffffff; 
            --text: #1d1d1f; 
            --border: #d2d2d7; 
            --guide-color: rgba(40, 205, 65, 0.6); /* 연한 녹색 가이드 */
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            width: 1280px; 
            height: 800px; 
            overflow: hidden; 
        }

        /* 왼쪽: 카메라 섹션 */
        .left-panel { 
            flex: 1.4; 
            display: flex; 
            flex-direction: column; 
            background: #000; 
            position: relative; 
        }

        #video-feed { 
            width: 100%; 
            height: 82%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            background: #222; 
        }

        /* --- 안구 촬영 가이드 UI --- */
        .guide-overlay {
            position: absolute;
            top: 41%; /* 비디오 영역의 중앙 */
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; /* 클릭 방해 금지 */
            z-index: 5;
        }

        /* 안구 전체 윤곽 가이드 */
        .eye-outline {
            width: 450px;
            height: 220px;
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50% / 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 홍채(Iris) 위치 가이드 */
        .iris-circle {
            width: 180px;
            height: 180px;
            border: 3px dashed var(--guide-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 동공(Pupil) 위치 가이드 */
        .pupil-dot {
            width: 50px;
            height: 50px;
            border: 2px solid var(--guide-color);
            border-radius: 50%;
            background: rgba(40, 205, 65, 0.1);
        }

        .guide-text {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: var(--primary);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 하단 및 우측 패널 스타일 유지 */
        .camera-bottom-btns { height: 18%; background: #ffffff; display: flex; align-items: center; justify-content: center; gap: 20px; border-top: 1px solid var(--border); }
        .right-panel { flex: 1; padding: 30px; display: flex; flex-direction: column; justify-content: center; background: var(--bg); border-left: 1px solid var(--border); }
        .card { background: var(--card); padding: 25px; border-radius: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn-eye { flex: 1; padding: 20px; border-radius: 12px; border: 1px solid var(--border); background: #fff; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn-eye.active { border-color: var(--primary); background: var(--primary); color: #fff; }
        .btn-capture { width: 100%; padding: 25px; border-radius: 15px; background: var(--primary); color: white; font-weight: 800; border: none; font-size: 1.3rem; cursor: pointer; }
        .preview-thumbs { display: flex; gap: 15px; margin-top: 20px; justify-content: center; }
        .thumb { width: 120px; height: 90px; border: 2px solid var(--border); border-radius: 10px; background-size: cover; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="guide-text">동공과 홍채를 가이드에 맞춰주세요</div>
        
        <!-- Canvas 또는 img로 프레임 표시 -->
        <img id="video-feed" src="/video_feed" style="width: 100%; height: 82%; object-fit: cover; transform: scaleX(-1); background: #222; display: block;">
        
        <div class="guide-overlay">
            <div class="eye-outline">
                <div class="iris-circle">
                    <div class="pupil-dot"></div>
                </div>
            </div>
        </div>

        <div class="camera-bottom-btns">
            <div style="font-size: 0.9rem; color: #64748b;">
                ※ 고해상도 촬영을 위해 가이드 중앙에 눈을 정렬해 주세요.
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="card">
            <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--primary);">Step 0. 눈 감지 상태</h2>
            <div id="detection-status" style="display: flex; align-items: center; gap: 10px; padding: 15px; background: #f0f0f0; border-radius: 10px;">
                <div id="status-dot" style="width: 12px; height: 12px; border-radius: 50%; background: #ccc;"></div>
                <div>
                    <div id="status-message" style="font-size: 0.95rem; color: #64748b;">카메라 연결 중...</div>
                    <div id="confidence-text" style="font-size: 0.85rem; color: #999; margin-top: 3px;"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--primary);">Step 1. 촬영 부위 선택</h2>
            <div style="display: flex; gap: 10px;">
                <button class="btn-eye active" id="btn-L" onclick="selectEye('L')">왼쪽 눈 (L)</button>
                <button class="btn-eye" id="btn-R" onclick="selectEye('R')">오른쪽 눈 (R)</button>
            </div>
        </div>

        <div class="card">
            <h2 style="margin:0 0 15px 0; font-size: 1.2rem; color: var(--primary);">Step 2. 안구 캡처</h2>
            <button class="btn-capture" onclick="takeSnapshot()">📸 지금 촬영하기</button>
            <div class="preview-thumbs" id="previews">
                <div style="text-align:center;"><div id="thumb-L" class="thumb"></div>L</div>
                <div style="text-align:center;"><div id="thumb-R" class="thumb"></div>R</div>
            </div>
        </div>
    </div>

    <script>
        let currentEye = 'L';
        const photos = { L: null, R: null };
        let detectionPollingInterval = null;
        let frameStreamInterval = null;
        const canvas = document.getElementById('video-feed');
        const ctx = canvas ? canvas.getContext('2d') : null;
        
        function selectEye(side) {
            currentEye = side;
            document.getElementById('btn-L').classList.toggle('active', side === 'L');
            document.getElementById('btn-R').classList.toggle('active', side === 'R');
        }

        // ==========================================
        // 눈 감지 상태 폴링 (서버에서 감지 여부 조회)
        // ==========================================
        async function pollDetectionStatus() {
            try {
                const response = await fetch('/detect_status');
                const data = await response.json();
                
                const statusDot = document.getElementById('status-dot');
                const statusMessage = document.getElementById('status-message');
                const confidenceText = document.getElementById('confidence-text');
                
                if (data.detected) {
                    statusDot.style.background = '#28cd41';  // 녹색
                    statusMessage.textContent = data.message;
                    confidenceText.textContent = `신뢰도: ${(data.confidence * 100).toFixed(1)}%`;
                } else {
                    statusDot.style.background = '#b0bec5';  // 회색
                    statusMessage.textContent = data.message;
                    confidenceText.textContent = '';
                }
            } catch (error) {
                console.error('[Detection Status Error]', error);
            }
        }

        // ==========================================
        // 카메라 이미지 캡처 및 분석
        // ==========================================
        function takeSnapshot() {
            const videoImg = document.getElementById('video-feed');
        
            // 1. 사진을 찍을 찰나에만 안 보이는 임시 캔버스를 만듭니다.
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 640;  // 젯슨 서버에서 보내는 해상도와 맞춤
            tempCanvas.height = 480;
            const ctx = tempCanvas.getContext('2d');
        
            // 2. 화면에 송출 중인 영상의 현재 프레임을 캔버스에 복사합니다.
            // (UI는 거울처럼 반전되어 있지만, AI 진단을 위해 원본 방향 그대로 캡처합니다)
            ctx.drawImage(videoImg, 0, 0, tempCanvas.width, tempCanvas.height);
        
            // 3. 이미지를 Base64 데이터로 변환
            const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.8);
            photos[currentEye] = dataUrl;
        
            // 로컬 미리보기 업데이트
            updatePreviews();

         // 서버로 전송
            analyzeWithServer(dataUrl, currentEye);
        }

        // ==========================================
        // 서버 분석 (Base64 이미지 → EfficientNet)
        // ==========================================
        async function analyzeWithServer(base64Image, eye) {
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: base64Image
                    })
                });

                const result = await response.json();
                
                if (response.ok) {
                    console.log(`[${eye} Eye Analysis] Disease: ${result.result}, Confidence: ${result.confidence}%`);
                    
                    // (선택) 분석 결과를 로컬스토리지에 저장
                    localStorage.setItem(`eye_analysis_${eye}`, JSON.stringify(result));
                } else {
                    console.error(`[Analysis Error] ${result.error}`);
                }
            } catch (error) {
                console.error('[Server Analysis Error]', error);
            }

            // ==========================================
            // 3. 두 눈 모두 촬영 완료 시 결과 페이지로 이동
            // ==========================================
            if (photos.L && photos.R) {
                localStorage.setItem('eye_photo_L', photos.L);
                localStorage.setItem('eye_photo_R', photos.R);
                // 잠시 후 결과 페이지로 이동
                setTimeout(() => {
                    window.location.href = '/result';
                }, 1000);
            } else {
                // 다음 눈으로 전환
                selectEye(currentEye === 'L' ? 'R' : 'L');
            }
        }

        function updatePreviews() {
            ['L', 'R'].forEach(side => {
                if (photos[side]) {
                    const thumbDiv = document.getElementById('thumb-' + side);
                    thumbDiv.style.backgroundImage = `url(${photos[side]})`;
                }
            });
        }

        // 화면 로딩 시 프레임 스트리밍 및 감지 폴링 시작
        window.onload = () => {
            selectEye('L');
            
            // 프레임 스트리밍 시작 (백그라운드에서 계속 실행)
            streamFramesToCanvas();
            
            // 감지 상태 즉시 조회 & 주기적으로 폴링 (500ms)
            pollDetectionStatus();
            detectionPollingInterval = setInterval(pollDetectionStatus, 500);
        };

        // 페이지 종료 시 폴링 중지
        window.onbeforeunload = () => {
            if (detectionPollingInterval) {
                clearInterval(detectionPollingInterval);
            }
        };
    </script>
</body>
</html>
