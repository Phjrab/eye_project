<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 안구 건강 스크리닝 결과</title>
    <style>
        :root { 
            --primary: #007AFF; 
            --bg: #f5f5f7; 
            --card: #ffffff; 
            --text: #1d1d1f; 
            --accent: #28cd41; 
            --danger: #ff3b30; 
            --warning: #ff9500; 
            --border: #d2d2d7; 
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            width: 1280px; 
            height: 800px; 
            overflow: hidden; 
        }

        /* 왼쪽: 이미지 표시 영역 */
        .left-panel { 
            flex: 1.4; 
            display: flex; 
            flex-direction: column; 
            background: #000; 
            position: relative; 
        }

        #captured-image { 
            width: 100%; 
            height: 82%; 
            object-fit: contain; 
            background: #111; 
        }

        .eye-toggle-overlay { 
            position: absolute; 
            top: 5%; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 10px; 
            z-index: 20; 
        }

        .btn-toggle { 
            padding: 10px 25px; 
            border-radius: 30px; 
            border: none; 
            background: rgba(255,255,255,0.9); 
            font-weight: bold; 
            cursor: pointer; 
        }

        .btn-toggle.active { background: var(--primary); color: #fff; }

        .camera-bottom-btns { 
            height: 18%; 
            background: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: space-around; 
            padding: 0 20px; 
            gap: 15px; 
            border-top: 1px solid var(--border); 
        }

        /* 오른쪽: 데이터 대시보드 */
        .right-panel { 
            flex: 1; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: var(--bg); 
            border-left: 1px solid var(--border); 
            overflow-y: auto; 
        }

        .card { 
            background: var(--card); 
            padding: 18px; 
            border-radius: 18px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }

        h2 { margin: 0 0 12px 0; font-size: 1.1rem; color: var(--primary); }

        .status-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 0; 
            border-bottom: 1px solid #f2f2f7; 
            font-size: 0.95rem; 
        }

        .status-tag { font-weight: bold; }
        .tag-normal { color: var(--accent); } 
        .tag-danger { color: var(--danger); } 
        .tag-warning { color: var(--warning); }
        .red-level-normal { color: #16a34a; font-weight: 700; }
        .red-level-mild { color: #ca8a04; font-weight: 700; }
        .red-level-severe { color: #ea580c; font-weight: 700; }
        .red-level-very-severe { color: #dc2626; font-weight: 800; }

        /* 하단 버튼 스타일 */
        .btn { border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-camera-sub { flex: 1; height: 70%; background: #f2f2f7; color: #3a3a3c; }
        .btn-retake { background: #fdf2f2; color: var(--danger); border: 1px solid rgba(255, 59, 48, 0.2); }
        .btn-main { width: 100%; padding: 20px; background: var(--primary); color: white; font-size: 1.1rem; }

        .update-notice {
            font-size: 0.72rem;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        input[type="number"] { width: 40%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="eye-toggle-overlay">
            <button id="tog-L" class="btn-toggle active" onclick="displayPhoto('L')">왼쪽 눈 (L)</button>
            <button id="tog-R" class="btn-toggle" onclick="displayPhoto('R')">오른쪽 눈 (R)</button>
        </div>
        
        <img id="captured-image" alt="진단 이미지">

        <div class="camera-bottom-btns">
            <button class="btn btn-camera-sub btn-retake" onclick="retakePhotos()">🔄 안구 재촬영</button>
            <button id="btn-generate-report" class="btn btn-camera-sub" onclick="generateReport()">📋 리포트 발행</button>
            <button class="btn btn-camera-sub" onclick="window.open('https://map.naver.com/v5/search/안과')">📍 주변 안과</button>
        </div>
    </div>

    <div class="right-panel">
        <div class="card">
            <h2>🔍 자동 측정 데이터</h2>
            <div style="font-size:0.9rem; color:#475569;">
                <div>좌안 충혈도: <b id="redness-left">-</b> <span id="redness-left-level"></span></div>
                <div style="margin-top:4px;">우안 충혈도: <b id="redness-right">-</b> <span id="redness-right-level"></span></div>
                <div style="margin-top:6px; font-size:0.8rem; color:#64748b;">
                    기준: 정상(&lt;0.08) · 경미(0.08~&lt;0.14) · 심함(0.14~&lt;0.22) · 매우심함(≥0.22)
                </div>
            </div>
        </div>

        <div class="card">
            <h2>✍️ 사용자 시력 입력</h2>
            <div style="display:flex; justify-content: space-around; align-items: center;">
                <label>좌(L)</label> <input type="number" step="0.1" placeholder="1.0">
                <label>우(R)</label> <input type="number" step="0.1" placeholder="1.0">
            </div>
        </div>

        <div class="card">
            <h2>🤖 AI 질환 분석 결과</h2>
            <div class="status-item"><span>일반 (Normal)</span><span id="ai-normal" class="status-tag tag-normal">분석 대기</span></div>
            <div class="status-item"><span>결막염</span><span id="ai-conj" class="status-tag tag-normal">분석 대기</span></div>
            <div class="status-item"><span>포도막염</span><span id="ai-uveitis" class="status-tag tag-normal">분석 대기</span></div>
            <div class="status-item"><span>백내장</span><span id="ai-cataract" class="status-tag tag-normal">분석 대기</span></div>
            <div class="status-item" style="border:none;"><span>다래끼</span><span id="ai-eyelid" class="status-tag tag-normal">분석 대기</span></div>
        </div>

        <div style="margin-top: auto;">
            <p id="update-notice" class="update-notice">
                ※ 최신 분석 데이터 확인 중입니다.
            </p>
            <button id="btn-update-status" class="btn btn-main" onclick="updateData()">🔄 분석 데이터 상태 확인</button>
        </div>
    </div>

    <script>
        function setStatusTag(el, level, text) {
            el.classList.remove('tag-normal', 'tag-warning', 'tag-danger');
            el.classList.add(level);
            el.textContent = text;
        }

        function confidenceToLevel(conf) {
            if (conf >= 80) return 'tag-danger';
            if (conf >= 60) return 'tag-warning';
            return 'tag-normal';
        }

        function formatResultText(conf) {
            const safeConf = readConfidencePercent(conf);
            if (safeConf >= 80) return `의심(높음, ${safeConf.toFixed(1)}%)`;
            if (safeConf >= 60) return `관찰 필요(${safeConf.toFixed(1)}%)`;
            return `미검출/낮음(${safeConf.toFixed(1)}%)`;
        }

        function formatNormalText(conf) {
            const safeConf = readConfidencePercent(conf);
            if (safeConf >= 80) return `정상 가능성 높음(${safeConf.toFixed(1)}%)`;
            if (safeConf >= 60) return `정상 가능성 중간(${safeConf.toFixed(1)}%)`;
            return `정상 가능성 낮음(${safeConf.toFixed(1)}%)`;
        }

        function parseStoredJson(key) {
            const raw = localStorage.getItem(key);
            if (!raw) return null;
            try {
                return JSON.parse(raw);
            } catch (error) {
                console.warn(`[Storage Parse Error] ${key}`, error);
                return null;
            }
        }

        function readNumber(value) {
            const num = Number(value);
            return Number.isFinite(num) ? num : null;
        }

        function readConfidencePercent(value) {
            const num = readNumber(value);
            if (num === null) return 0;
            return num <= 1 ? num * 100 : num;
        }

        function getStoredAnalysis() {
            const stored = parseStoredJson('bilateral_analysis') || {};
            const leftStored = parseStoredJson('eye_analysis_L');
            const rightStored = parseStoredJson('eye_analysis_R');

            return {
                ...stored,
                left_eye: leftStored || stored.left_eye || null,
                right_eye: rightStored || stored.right_eye || null
            };
        }

        function hasUsableAnalysis(analysis) {
            return !!(analysis && (analysis.left_eye || analysis.right_eye));
        }

        function isLatestDataReady() {
            const analysis = getStoredAnalysis();
            return hasUsableAnalysis(analysis);
        }

        function refreshReportAvailability() {
            const reportBtn = document.getElementById('btn-generate-report');
            const statusBtn = document.getElementById('btn-update-status');
            const noticeEl = document.getElementById('update-notice');
            const ready = isLatestDataReady();

            reportBtn.disabled = !ready;

            if (ready) {
                noticeEl.textContent = '※ 최신 분석 데이터가 준비되어 바로 리포트를 발행할 수 있습니다.';
                statusBtn.textContent = '✅ 최신 데이터 확인 완료';
                statusBtn.style.background = '#16a34a';
            } else {
                noticeEl.textContent = '※ 아직 최신 분석 데이터가 없습니다. 좌/우 눈 분석을 먼저 완료해 주세요.';
                statusBtn.textContent = '🔄 분석 데이터 상태 확인';
                statusBtn.style.background = '';
            }
        }

        function extractDiseaseScores(analysis) {
            const scores = {
                normal: 0,
                conj: 0,
                uveitis: 0,
                eyelid: 0,
                cataract: 0
            };

            const eyes = [analysis?.left_eye, analysis?.right_eye].filter(Boolean);
            for (const eye of eyes) {
                const disease = String(eye.disease || '');
                const conf = readConfidencePercent(eye.confidence);

                if (disease.includes('일반') || disease.includes('Normal')) {
                    scores.normal = Math.max(scores.normal, conf);
                } else if (disease.includes('결막염') || disease.includes('Conjunctivitis')) {
                    scores.conj = Math.max(scores.conj, conf);
                } else if (disease.includes('포도막염') || disease.includes('Uveitis')) {
                    scores.uveitis = Math.max(scores.uveitis, conf);
                } else if (disease.includes('다래끼') || disease.includes('Eyelid')) {
                    scores.eyelid = Math.max(scores.eyelid, conf);
                } else if (disease.includes('백내장') || disease.includes('Cataract')) {
                    scores.cataract = Math.max(scores.cataract, conf);
                }
            }

            return scores;
        }

        function getRednessLevel(redness) {
            const value = Number(redness || 0);
            if (value < 0.08) return { text: '정상', className: 'red-level-normal' };
            if (value < 0.14) return { text: '경미', className: 'red-level-mild' };
            if (value < 0.22) return { text: '심함', className: 'red-level-severe' };
            return { text: '매우심함', className: 'red-level-very-severe' };
        }

        function renderRednessInfo(analysis) {
            const leftValEl = document.getElementById('redness-left');
            const rightValEl = document.getElementById('redness-right');
            const leftLevelEl = document.getElementById('redness-left-level');
            const rightLevelEl = document.getElementById('redness-right-level');

            const left = readNumber(analysis?.left_eye?.redness);
            const right = readNumber(analysis?.right_eye?.redness);

            if (left !== null) {
                const lv = getRednessLevel(left);
                leftValEl.textContent = left.toFixed(4);
                leftLevelEl.textContent = `(${lv.text})`;
                leftLevelEl.className = lv.className;
            } else {
                leftValEl.textContent = '-';
                leftLevelEl.textContent = '';
                leftLevelEl.className = '';
            }

            if (right !== null) {
                const lv = getRednessLevel(right);
                rightValEl.textContent = right.toFixed(4);
                rightLevelEl.textContent = `(${lv.text})`;
                rightLevelEl.className = lv.className;
            } else {
                rightValEl.textContent = '-';
                rightLevelEl.textContent = '';
                rightLevelEl.className = '';
            }
        }

        function renderAiResults() {
            const normalEl = document.getElementById('ai-normal');
            const conjEl = document.getElementById('ai-conj');
            const uveitisEl = document.getElementById('ai-uveitis');
            const eyelidEl = document.getElementById('ai-eyelid');
            const cataractEl = document.getElementById('ai-cataract');

            const analysis = getStoredAnalysis();
            if (!analysis.left_eye && !analysis.right_eye) {
                setStatusTag(normalEl, 'tag-warning', '분석 데이터 없음');
                setStatusTag(conjEl, 'tag-warning', '분석 데이터 없음');
                setStatusTag(uveitisEl, 'tag-warning', '분석 데이터 없음');
                setStatusTag(eyelidEl, 'tag-warning', '분석 데이터 없음');
                setStatusTag(cataractEl, 'tag-warning', '분석 데이터 없음');
                return;
            }

            renderRednessInfo(analysis);

            const scores = extractDiseaseScores(analysis);
            setStatusTag(normalEl, confidenceToLevel(scores.normal), formatNormalText(scores.normal));
            setStatusTag(conjEl, confidenceToLevel(scores.conj), formatResultText(scores.conj));
            setStatusTag(uveitisEl, confidenceToLevel(scores.uveitis), formatResultText(scores.uveitis));
            setStatusTag(eyelidEl, confidenceToLevel(scores.eyelid), formatResultText(scores.eyelid));
            setStatusTag(cataractEl, confidenceToLevel(scores.cataract), formatResultText(scores.cataract));
            refreshReportAvailability();
        }

        // 1. 이미지 표시 로직
        function displayPhoto(side) {
            const photo = localStorage.getItem('eye_photo_' + side) || localStorage.getItem('bilateral_capture');
            if(photo) {
                document.getElementById('captured-image').src = photo;
                document.getElementById('tog-L').classList.toggle('active', side === 'L');
                document.getElementById('tog-R').classList.toggle('active', side === 'R');
            }
        }

        function renderPhotoToggles() {
            const hasLeft = !!localStorage.getItem('eye_photo_L');
            const hasRight = !!localStorage.getItem('eye_photo_R');
            document.getElementById('tog-L').disabled = !hasLeft;
            document.getElementById('tog-R').disabled = !hasRight;

            if (hasLeft) {
                displayPhoto('L');
            } else if (hasRight) {
                displayPhoto('R');
            }
        }

        // 2. 재촬영 로직
        function retakePhotos() {
            if (confirm("현재 화면의 임시 촬영/분석 데이터만 초기화하고 다시 촬영하시겠습니까?\n이미 저장된 DB 이력과 기존 리포트 기록은 삭제되지 않습니다.")) {
                localStorage.removeItem('eye_photo_L');
                localStorage.removeItem('eye_photo_R');
                localStorage.removeItem('eye_analysis_L');
                localStorage.removeItem('eye_analysis_R');
                localStorage.removeItem('bilateral_capture');
                localStorage.removeItem('bilateral_analysis');
                localStorage.removeItem('data_updated');
                window.location.href = '/capture';
            }
        }

        // 3. 최신 데이터 상태 확인
        function updateData() {
            refreshReportAvailability();

            if (isLatestDataReady()) {
                localStorage.setItem('data_updated', 'true');
                alert("최신 분석 데이터가 확인되었습니다. 바로 리포트를 발행할 수 있습니다.");
            } else {
                localStorage.setItem('data_updated', 'false');
                alert("아직 최신 분석 데이터가 없습니다. 좌/우 눈 분석을 먼저 완료해 주세요.");
            }
        }

        // 4. 리포트 발행 및 페이지 이동 (report.html 연결)
        function generateReport() {
            if (isLatestDataReady()) {
                localStorage.setItem('data_updated', 'true');
                window.location.href = '/report';
            } else {
                localStorage.setItem('data_updated', 'false');
                refreshReportAvailability();
                alert("리포트 발행에 필요한 최신 분석 데이터가 없습니다.");
            }
        }

        window.onload = () => {
            renderPhotoToggles();
            renderAiResults();
            localStorage.setItem('data_updated', isLatestDataReady() ? 'true' : 'false');
            refreshReportAvailability();
        };
    </script>
</body>
</html>
