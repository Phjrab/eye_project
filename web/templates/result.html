<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 안구 건강 스크리닝 결과</title>
    <style>
        :root { 
            --primary: #007AFF; 
            --bg: #f5f5f7; 
            --card: #ffffff; 
            --text: #1d1d1f; 
            --accent: #28cd41; 
            --danger: #ff3b30; 
            --warning: #ff9500; 
            --border: #d2d2d7; 
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            width: 1280px; 
            height: 800px; 
            overflow: hidden; 
        }

        /* 왼쪽: 이미지 표시 섹션 */
        .left-panel { 
            flex: 1.4; 
            display: flex; 
            flex-direction: column; 
            background: #000; 
            position: relative; 
        }

        #captured-image { 
            width: 100%; 
            height: 82%; 
            object-fit: contain; 
            background: #111; 
        }

        .eye-toggle-overlay { 
            position: absolute; 
            top: 5%; 
            left: 50%; 
            transform: translateX(-50%); 
            display: flex; 
            gap: 10px; 
            z-index: 20; 
        }

        .btn-toggle { 
            padding: 10px 25px; 
            border-radius: 30px; 
            border: none; 
            background: rgba(255,255,255,0.9); 
            font-weight: bold; 
            cursor: pointer; 
            color: var(--text); 
        }

        .btn-toggle.active { 
            background: var(--primary); 
            color: #fff; 
        }

        /* 하단 버튼 영역 */
        .camera-bottom-btns { 
            height: 18%; 
            background: #ffffff; 
            display: flex; 
            align-items: center; 
            justify-content: space-around; 
            padding: 0 20px; 
            gap: 15px; 
            border-top: 1px solid var(--border); 
        }

        /* 오른쪽: 진단 데이터 패널 */
        .right-panel { 
            flex: 1; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: var(--bg); 
            border-left: 1px solid var(--border); 
            overflow-y: auto; 
        }

        .card { 
            background: var(--card); 
            padding: 18px; 
            border-radius: 18px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
        }

        h2 { margin: 0 0 12px 0; font-size: 1.1rem; color: var(--primary); }

        .status-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 0; 
            border-bottom: 1px solid #f2f2f7; 
            font-size: 0.95rem; 
        }

        .status-tag { font-weight: bold; }
        .tag-normal { color: var(--accent); } 
        .tag-danger { color: var(--danger); } 
        .tag-warning { color: var(--warning); }

        .tip-box { 
            background: #fff9e6; 
            border-left: 4px solid var(--warning); 
            padding: 12px; 
            font-size: 0.85rem; 
            line-height: 1.5; 
            color: #444; 
            margin-top: 10px; 
            border-radius: 0 10px 10px 0; 
        }

        .btn { 
            border: none; 
            border-radius: 12px; 
            font-size: 1rem; 
            font-weight: 700; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s; 
        }

        .btn-camera-sub { flex: 1; height: 70%; background: #f2f2f7; color: #3a3a3c; }
        
        /* 재촬영 버튼 강조 스타일 */
        .btn-retake { 
            background: #fdf2f2; 
            color: var(--danger); 
            border: 1px solid rgba(255, 59, 48, 0.2); 
        }
        .btn-retake:hover { background: #fee2e2; }

        .btn-naver { background: #2DB400; color: white; }
        .btn-main { width: 100%; padding: 20px; background: var(--primary); color: white; font-size: 1.1rem; }
        
        input[type="number"] { 
            width: 40%; 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="eye-toggle-overlay">
            <button id="tog-L" class="btn-toggle active" onclick="displayPhoto('L')">왼쪽 눈 (L)</button>
            <button id="tog-R" class="btn-toggle" onclick="displayPhoto('R')">오른쪽 눈 (R)</button>
        </div>
        
        <img id="captured-image" alt="진단 안구 이미지">

        <div class="camera-bottom-btns">
            <button class="btn btn-camera-sub btn-retake" onclick="retakePhotos()">🔄 안구 재촬영</button>
            <button class="btn btn-camera-sub">📋 리포트 발행</button>
            <button class="btn btn-camera-sub btn-naver" onclick="window.open('https://map.naver.com/v5/search/안과')">📍 주변 안과</button>
        </div>
    </div>

    <div class="right-panel">
        <div class="card">
            <h2>🔍 자동 측정 데이터</h2>
            <div style="display:flex; justify-content:space-between; font-size: 0.9rem;">
                <span>홍채 직경: <b style="color:var(--primary)">11.8mm</b></span>
                <span>홍채 색상: <b style="color:var(--primary)">Brown</b></span>
            </div>
        </div>

        <div class="card">
            <h2>✍️ 사용자 시력 입력</h2>
            <div style="display:flex; justify-content: space-around; align-items: center;">
                <label>좌(L)</label> <input type="number" step="0.1" placeholder="1.0">
                <label>우(R)</label> <input type="number" step="0.1" placeholder="1.0">
            </div>
        </div>

        <div class="card">
            <h2>🤖 AI 질환 분석 결과</h2>
            <div class="status-item"><span>결막염 및 충혈</span><span class="status-tag tag-danger">의심(높음)</span></div>
            <div class="status-item"><span>다래끼 유무</span><span class="status-tag tag-normal">미검출</span></div>
            <div class="status-item"><span>백내장 이상 징후</span><span class="status-tag tag-warning">관찰 필요</span></div>
            <div class="status-item" style="border:none;"><span>기타(익상편 등)</span><span class="status-tag tag-normal">정상</span></div>

            <div class="tip-box">
                <strong>💡 AI 맞춤형 권고 사항:</strong><br>
                1. <b>충혈 관리</b>: 결막염 증상이 의심됩니다. 전염 위험이 있으니 눈을 비비지 마세요.<br>
                2. <b>정밀 검사 권고</b>: 수정체 영역에 미세한 혼탁이 관찰되므로 안과 방문을 권장합니다.
            </div>
        </div>

        <div style="margin-top: auto;">
            <button class="btn btn-main">⚡ 안구 건강 데이터 업데이트</button>
        </div>
    </div>

    <script>
        // 1. 저장된 사진 불러오기 및 화면 표시
        function displayPhoto(side) {
            const photo = localStorage.getItem('eye_photo_' + side);
            if(photo) {
                document.getElementById('captured-image').src = photo;
                document.getElementById('tog-L').classList.toggle('active', side === 'L');
                document.getElementById('tog-R').classList.toggle('active', side === 'R');
            } else {
                alert("해당 안구의 촬영 데이터가 없습니다.");
            }
        }

        // 2. 안구 재촬영 기능 (데이터 초기화 후 capture.html로 이동)
        function retakePhotos() {
            if (confirm("현재 촬영된 양쪽 안구 데이터를 모두 삭제하고 다시 촬영하시겠습니까?")) {
                localStorage.removeItem('eye_photo_L');
                localStorage.removeItem('eye_photo_R');
                // 현재 폴더에 있는 capture.html 파일로 이동합니다.
                window.location.href = './capture.html';
            }
        }

        window.onload = () => {
            // 초기 로드 시 왼쪽 눈 사진 표시
            displayPhoto('L');
        };
    </script>
</body>
</html>
