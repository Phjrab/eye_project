<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Eye Healthcare Kiosk</title>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem('theme');
                var theme = (savedTheme === 'dark' || savedTheme === 'light') ? savedTheme : 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        :root {
            --primary: #007AFF;
            --primary-2: #5856D6;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --tag-bg: #f1f5f9;
            --helper: #94a3b8;
            --inset-shadow: rgba(0,0,0,0.02);
            --btn-shadow: rgba(0, 122, 255, 0.3);
            --btn-shadow-hover: rgba(0, 122, 255, 0.4);
            --theme-btn-bg: #ffffff;
            --theme-btn-text: #0f172a;
            --theme-btn-border: #e2e8f0;
            --theme-btn-shadow: rgba(15, 23, 42, 0.08);
            --theme-btn-active: #f8fafc;
        }

        [data-theme="dark"] {
            --primary: #4ea1ff;
            --primary-2: #7b79ff;
            --bg: #0f1115;
            --card-bg: #161a22;
            --text-dark: #e5e7eb;
            --text-sub: #aab3c2;
            --border: #2a3240;
            --tag-bg: #1a2230;
            --helper: #8a94a8;
            --inset-shadow: rgba(255,255,255,0.02);
            --btn-shadow: rgba(78, 161, 255, 0.32);
            --btn-shadow-hover: rgba(78, 161, 255, 0.45);
            --theme-btn-bg: #1f2632;
            --theme-btn-text: #e5e7eb;
            --theme-btn-border: #334155;
            --theme-btn-shadow: rgba(0, 0, 0, 0.35);
            --theme-btn-active: #273244;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            /* 키오스크 규격 고정 */
            width: 1280px;
            height: 800px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .welcome-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--card-bg);
            box-shadow: inset 0 0 100px var(--inset-shadow);
            position: relative;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .theme-toggle-floating {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 3000;
            border: 1px solid var(--theme-btn-border);
            background: var(--theme-btn-bg);
            color: var(--theme-btn-text);
            border-radius: 999px;
            min-height: 44px;
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: -0.2px;
            cursor: pointer;
            box-shadow: 0 8px 20px var(--theme-btn-shadow);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.2s ease;
        }

        .theme-toggle-floating:hover {
            transform: translateY(-1px);
            background: var(--theme-btn-active);
        }

        .theme-toggle-floating:active {
            transform: scale(0.98);
        }

        /* 메인 비주얼 아이콘 */
        .main-visual {
            margin-bottom: 30px;
        }

        .eye-scan-icon {
            font-size: 7rem;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--text-dark);
            margin: 0 0 20px 0;
            font-weight: 800;
            letter-spacing: -1.5px;
        }

        .subtitle {
            font-size: 1.4rem;
            color: var(--text-sub);
            margin-bottom: 50px;
            line-height: 1.6;
        }

        /* 질환 태그 */
        .feature-tags {
            margin-bottom: 60px;
        }

        .feature-tags span {
            display: inline-block;
            background: var(--tag-bg);
            color: var(--primary);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 10px;
            border: 1px solid var(--border);
        }

        /* 진단 시작하기 버튼 */
        .btn-start {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: white;
            padding: 25px 100px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 15px 35px var(--btn-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .btn-start:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px var(--btn-shadow-hover);
            filter: brightness(1.1);
        }

        .btn-start:active {
            transform: scale(0.96);
        }

        .helper-text {
            margin-top: 30px;
            font-size: 1rem;
            color: var(--helper);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="welcome-container">
    <button id="global-theme-toggle" class="theme-toggle-floating" type="button" aria-label="다크 모드 토글">
        <span data-role="icon">🌙</span>
        <span data-role="label">다크 모드</span>
    </button>

    <div class="main-visual">
        <span class="eye-scan-icon">👁️</span>
    </div>

    <h1>안구 건강 진단 서비스</h1>
    <p class="subtitle">
        <strong>NVIDIA Jetson AI</strong> 기술을 활용하여<br>
        빠르고 정확하게 눈 상태를 점검하세요.
    </p>
    
    <div class="feature-tags">
        <span>#결막염</span>
        <span>#백내장</span>
        <span>#익상편</span>
    </div>

    <div class="start-section">
        <a href="{{ url_for('login') }}" class="btn-start">
            진단 시작하기
        </a>
        <p class="helper-text">※ 본 서비스는 의료 보조 및 스크리닝 목적으로 제공됩니다.</p>
    </div>
</div>

<script>
    (function () {
        const root = document.documentElement;
        const btn = document.getElementById('global-theme-toggle');
        const icon = btn.querySelector('[data-role="icon"]');
        const label = btn.querySelector('[data-role="label"]');

        function getTheme() {
            const now = root.getAttribute('data-theme');
            return (now === 'dark' || now === 'light') ? now : 'light';
        }

        function applyTheme(theme) {
            root.setAttribute('data-theme', theme);
            try {
                localStorage.setItem('theme', theme);
            } catch (e) {
                // ignore storage errors
            }

            if (theme === 'dark') {
                icon.textContent = '☀️';
                label.textContent = '라이트 모드';
            } else {
                icon.textContent = '🌙';
                label.textContent = '다크 모드';
            }
        }

        applyTheme(getTheme());

        btn.addEventListener('click', function () {
            const next = getTheme() === 'dark' ? 'light' : 'dark';
            applyTheme(next);
        });
    })();
</script>

</body>
</html>
