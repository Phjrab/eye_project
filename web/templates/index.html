<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Eye Healthcare Kiosk</title>
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem('theme');
                var theme = (savedTheme === 'dark' || savedTheme === 'light') ? savedTheme : 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #007AFF;
            --primary-2: #5856D6;
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --tag-bg: #f1f5f9;
            --helper: #94a3b8;
            --inset-shadow: rgba(0,0,0,0.02);
            --btn-shadow: rgba(0, 122, 255, 0.3);
            --btn-shadow-hover: rgba(0, 122, 255, 0.4);
            --theme-btn-bg: #ffffff;
            --theme-btn-text: #0f172a;
            --theme-btn-border: #e2e8f0;
            --theme-btn-shadow: rgba(15, 23, 42, 0.08);
            --theme-btn-active: #f8fafc;
        }

        [data-theme="dark"] {
            --primary: #4ea1ff;
            --primary-2: #7b79ff;
            --bg: #0f1115;
            --card-bg: #161a22;
            --text-dark: #e5e7eb;
            --text-sub: #aab3c2;
            --border: #2a3240;
            --tag-bg: #1a2230;
            --helper: #8a94a8;
            --inset-shadow: rgba(255,255,255,0.02);
            --btn-shadow: rgba(78, 161, 255, 0.32);
            --btn-shadow-hover: rgba(78, 161, 255, 0.45);
            --theme-btn-bg: #1f2632;
            --theme-btn-text: #e5e7eb;
            --theme-btn-border: #334155;
            --theme-btn-shadow: rgba(0, 0, 0, 0.35);
            --theme-btn-active: #273244;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            /* 키오스크 규격 고정 */
            width: 1280px;
            height: 800px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .welcome-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--card-bg);
            box-shadow: inset 0 0 100px var(--inset-shadow);
            position: relative;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .theme-toggle-floating {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 3000;
            border: 1px solid var(--theme-btn-border);
            background: var(--theme-btn-bg);
            color: var(--theme-btn-text);
            border-radius: 999px;
            min-height: 44px;
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: -0.2px;
            cursor: pointer;
            box-shadow: 0 8px 20px var(--theme-btn-shadow);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.2s ease;
        }

        .theme-toggle-floating:hover {
            transform: translateY(-1px);
            background: var(--theme-btn-active);
        }

        .theme-toggle-floating:active {
            transform: scale(0.98);
        }

        /* 메인 비주얼 아이콘 */
        .main-visual {
            margin-bottom: 30px;
        }

        .eye-scan-icon {
            font-size: 7rem;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--text-dark);
            margin: 0 0 20px 0;
            font-weight: 800;
            letter-spacing: -1.5px;
        }

        .subtitle {
            font-size: 1.4rem;
            color: var(--text-sub);
            margin-bottom: 50px;
            line-height: 1.6;
        }

        /* 질환 태그 */
        .feature-tags {
            margin-bottom: 60px;
        }

        .feature-tags span {
            display: inline-block;
            background: var(--tag-bg);
            color: var(--primary);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 10px;
            border: 1px solid var(--border);
        }

        /* 진단 시작하기 버튼 */
        .btn-start {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: white;
            padding: 25px 100px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 15px 35px var(--btn-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .start-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .start-section .btn-start,
        .start-section .btn-mobile-access {
            width: min(460px, 92vw);
            text-align: center;
            box-sizing: border-box;
        }

        .btn-start:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px var(--btn-shadow-hover);
            filter: brightness(1.1);
        }

        .btn-start:active {
            transform: scale(0.96);
        }

        .btn-mobile-access {
            margin-top: 0;
            display: inline-block;
            background: #e2e8f0;
            color: #1e293b;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 1.02rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }

        .mobile-o2o-overlay {
            position: fixed;
            inset: 0;
            display: none;
            z-index: 2100;
            background: rgba(15, 23, 42, 0.65);
            align-items: center;
            justify-content: center;
            padding: 28px;
            box-sizing: border-box;
        }

        .mobile-o2o-panel {
            width: min(760px, 100%);
            background: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.35);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }

        .mobile-o2o-header {
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            background: #f8fafc;
            box-sizing: border-box;
        }

        [data-theme="dark"] .mobile-o2o-header {
            background: #111827;
        }

        .mobile-o2o-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .mobile-o2o-close {
            border: none;
            background: #e2e8f0;
            color: #1e293b;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
        }

        .mobile-o2o-body {
            padding: 20px;
            text-align: center;
        }

        .mobile-step-note {
            margin: 0 0 14px;
            color: var(--text-sub);
            font-size: 0.96rem;
            line-height: 1.45;
        }

        #mobile-qr-wrap {
            width: 220px;
            height: 220px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mobile-server-url {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-sub);
            word-break: break-all;
        }

        .mobile-pin-box {
            margin-top: 18px;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #f8fafc;
            display: none;
        }

        [data-theme="dark"] .mobile-pin-box {
            background: #111827;
        }

        #mobile-pin-number {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: var(--primary);
            margin: 8px 0 0;
        }

        #mobile-connect-status,
        #mobile-complete-status {
            margin-top: 14px;
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        .helper-text {
            margin-top: 30px;
            font-size: 1rem;
            color: var(--helper);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media screen and (max-width: 768px) {
            body {
                width: 100%;
                min-height: 100vh;
                height: auto;
                overflow-x: hidden;
                overflow-y: auto;
                display: block;
            }

            .welcome-container {
                min-height: 100vh;
                height: auto;
                justify-content: flex-start;
                padding: 88px 18px 28px;
                box-sizing: border-box;
            }

            .theme-toggle-floating {
                right: 12px;
                bottom: 12px;
                min-height: 48px;
                padding: 12px 16px;
                font-size: 0.95rem;
            }

            .main-visual {
                margin-bottom: 18px;
            }

            .eye-scan-icon {
                font-size: 4.2rem;
            }

            h1 {
                font-size: 2rem;
                line-height: 1.3;
                margin-bottom: 12px;
            }

            .subtitle {
                font-size: 1rem;
                line-height: 1.5;
                margin-bottom: 28px;
            }

            .feature-tags {
                margin-bottom: 30px;
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .feature-tags span {
                margin: 0;
                padding: 10px 18px;
                font-size: 0.95rem;
                width: 100%;
                max-width: 320px;
                box-sizing: border-box;
            }

            .start-section {
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 14px;
            }

            .btn-start {
                width: 100%;
                max-width: 340px;
                min-height: 48px;
                padding: 14px 20px;
                box-sizing: border-box;
                font-size: 1.2rem;
                border-radius: 18px;
                text-align: center;
            }

            .helper-text {
                margin-top: 0;
                font-size: 0.88rem;
                line-height: 1.45;
                padding: 0 6px;
            }

            .btn-mobile-access {
                width: 100%;
                max-width: 340px;
                min-height: 48px;
                padding: 12px 18px;
                font-size: 1rem;
            }

            .mobile-o2o-overlay {
                padding: 12px;
            }

            .mobile-o2o-body {
                padding: 14px;
            }

            #mobile-qr-wrap {
                width: 190px;
                height: 190px;
            }

            #mobile-pin-number {
                font-size: 2rem;
                letter-spacing: 6px;
            }
        }
    </style>
</head>
<body>

<div class="welcome-container">
    <button id="global-theme-toggle" class="theme-toggle-floating" type="button" aria-label="다크 모드 토글">
        <span data-role="icon">🌙</span>
        <span data-role="label">다크 모드</span>
    </button>

    <div class="main-visual">
        <span class="eye-scan-icon">👁️</span>
    </div>

    <h1>안구 건강 진단 서비스</h1>
    <p class="subtitle">
        <strong>NVIDIA Jetson AI</strong> 기술을 활용하여<br>
        빠르고 정확하게 눈 상태를 점검하세요.
    </p>
    
    <div class="feature-tags">
        <span>#결막염</span>
        <span>#백내장</span>
        <span>#익상편</span>
    </div>

    <div class="start-section">
        <a href="{{ url_for('login') }}" class="btn-start">
            진단 시작하기
        </a>
        <button type="button" class="btn-mobile-access" onclick="openMobileAccessModal()">📱 모바일 기기로 접속</button>
        <p class="helper-text">※ 본 서비스는 의료 보조 및 스크리닝 목적으로 제공됩니다.</p>
    </div>
</div>

<div id="mobile-o2o-overlay" class="mobile-o2o-overlay" onclick="closeMobileAccessModal(event)">
    <div class="mobile-o2o-panel">
        <div class="mobile-o2o-header">
            <div class="mobile-o2o-title">모바일 연동 (O2O)</div>
            <button class="mobile-o2o-close" type="button" onclick="closeMobileAccessModal()">닫기</button>
        </div>
        <div class="mobile-o2o-body">
            <p class="mobile-step-note">1단계: 스마트폰으로 아래 QR 코드를 스캔해 접속하세요.</p>
            <div id="mobile-qr-wrap"><span style="font-size:0.88rem; color:#94a3b8;">QR 준비 중...</span></div>
            <div id="mobile-server-url"></div>

            <div id="mobile-connect-status">모바일 접속 대기 중...</div>

            <div id="mobile-pin-box" class="mobile-pin-box">
                <div style="font-size:0.92rem; color:var(--text-sub);">2단계: 스마트폰에 아래 PIN을 입력하세요</div>
                <div id="mobile-pin-number">----</div>
            </div>

            <div id="mobile-complete-status"></div>
        </div>
    </div>
</div>

<script>
    (function () {
        const root = document.documentElement;
        const btn = document.getElementById('global-theme-toggle');
        const icon = btn.querySelector('[data-role="icon"]');
        const label = btn.querySelector('[data-role="label"]');

        function getTheme() {
            const now = root.getAttribute('data-theme');
            return (now === 'dark' || now === 'light') ? now : 'light';
        }

        function applyTheme(theme) {
            root.setAttribute('data-theme', theme);
            try {
                localStorage.setItem('theme', theme);
            } catch (e) {
                // ignore storage errors
            }

            if (theme === 'dark') {
                icon.textContent = '☀️';
                label.textContent = '라이트 모드';
            } else {
                icon.textContent = '🌙';
                label.textContent = '다크 모드';
            }
        }

        applyTheme(getTheme());

        btn.addEventListener('click', function () {
            const next = getTheme() === 'dark' ? 'light' : 'dark';
            applyTheme(next);
        });
    })();
</script>

<script>
    let mobileAccessState = {
        requestId: null,
        pollTimer: null,
        countdownTimer: null,
        countdown: 0,
        completed: false
    };

    function resetMobileAccessState() {
        if (mobileAccessState.pollTimer) {
            clearInterval(mobileAccessState.pollTimer);
        }
        if (mobileAccessState.countdownTimer) {
            clearInterval(mobileAccessState.countdownTimer);
        }
        mobileAccessState = {
            requestId: null,
            pollTimer: null,
            countdownTimer: null,
            countdown: 0,
            completed: false
        };
    }

    function closeMobileAccessModal(event) {
        if (event && event.target && event.target.id !== 'mobile-o2o-overlay') {
            return;
        }
        const overlay = document.getElementById('mobile-o2o-overlay');
        if (overlay) overlay.style.display = 'none';
        resetMobileAccessState();
    }

    function renderMobileQr(url) {
        const qrWrap = document.getElementById('mobile-qr-wrap');
        qrWrap.innerHTML = '';
        new QRCode(qrWrap, {
            text: url,
            width: 180,
            height: 180,
            correctLevel: QRCode.CorrectLevel.M
        });
    }

    async function openMobileAccessModal() {
        const overlay = document.getElementById('mobile-o2o-overlay');
        const statusEl = document.getElementById('mobile-connect-status');
        const completeEl = document.getElementById('mobile-complete-status');
        const pinBox = document.getElementById('mobile-pin-box');
        const pinNumber = document.getElementById('mobile-pin-number');
        const urlEl = document.getElementById('mobile-server-url');

        resetMobileAccessState();
        completeEl.textContent = '';
        statusEl.textContent = '모바일 접속 대기 중...';
        pinBox.style.display = 'none';
        pinNumber.textContent = '----';
        overlay.style.display = 'flex';

        try {
            const res = await fetch('/api/generate_pin', { method: 'POST' });
            const data = await res.json();
            if (!res.ok || data.status !== 'ok') {
                throw new Error(data.message || 'PIN 발급 실패');
            }

            mobileAccessState.requestId = data.request_id;
            renderMobileQr(data.mobile_url);
            urlEl.textContent = data.mobile_url;

            mobileAccessState.pollTimer = setInterval(async () => {
                if (!mobileAccessState.requestId || mobileAccessState.completed) return;

                try {
                    const statusRes = await fetch(`/api/pin_status?request_id=${encodeURIComponent(mobileAccessState.requestId)}`);
                    const statusData = await statusRes.json();
                    if (!statusRes.ok || statusData.status !== 'ok') {
                        return;
                    }

                    if (statusData.mobile_connected) {
                        statusEl.textContent = '모바일 접속 확인됨. PIN을 입력해 주세요.';
                        pinBox.style.display = 'block';
                        pinNumber.textContent = statusData.pin || '----';
                    }

                    if (statusData.verified) {
                        mobileAccessState.completed = true;
                        statusEl.textContent = '모바일 인증이 완료되었습니다.';
                        mobileAccessState.countdown = 5;
                        completeEl.textContent = `기본 화면으로 ${mobileAccessState.countdown}초 후 돌아갑니다.`;

                        if (mobileAccessState.pollTimer) {
                            clearInterval(mobileAccessState.pollTimer);
                            mobileAccessState.pollTimer = null;
                        }

                        mobileAccessState.countdownTimer = setInterval(() => {
                            mobileAccessState.countdown -= 1;
                            if (mobileAccessState.countdown <= 0) {
                                clearInterval(mobileAccessState.countdownTimer);
                                closeMobileAccessModal();
                                window.location.href = '/';
                                return;
                            }
                            completeEl.textContent = `기본 화면으로 ${mobileAccessState.countdown}초 후 돌아갑니다.`;
                        }, 1000);
                    }
                } catch (e) {
                    // polling error ignore
                }
            }, 1000);
        } catch (error) {
            statusEl.textContent = `오류: ${error.message || error}`;
        }
    }
</script>

</body>
</html>
